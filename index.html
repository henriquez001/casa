<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>CASA</title>
<link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@300;400;500;700&family=Major+Mono+Display&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
/* ═══════════════════════════════════════════════
   DESIGN SYSTEM
   Sfondo: nero puro
   Box: trasparenti con solo contorno bianco 1px
   Font: Roboto Mono
   Stile: pulito, gerarchico, label piccola + valore grande
═══════════════════════════════════════════════ */
:root {
  --bg:   #000000;               /* sfondo */
  --brd:  rgba(255,255,255,.18); /* bordo box — bianco 18% */
  --brd2: rgba(255,255,255,.08); /* bordo secondario più sottile */
  --mid:  rgba(255,255,255,.45); /* testo secondario */
  --dim:  rgba(255,255,255,.2);  /* testo dimesso */
  --text: #ffffff;               /* testo principale */
  --r:    14px;                  /* border-radius base */
  --mono: 'Roboto Mono', monospace;
  --clock: 'Major Mono Display', monospace;
  --sep: 'Share Tech Mono', monospace;
}

* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

html, body {
  font-family: var(--mono);
  background: var(--bg);
  color: var(--text);
  width: 100vw; height: 100dvh;
  overflow: hidden;
  user-select: none;
  -webkit-font-smoothing: antialiased;
}

/* ══════════════════════════════
   SETUP
══════════════════════════════ */
#setup {
  position: fixed; inset: 0;
  background: var(--bg);
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  padding: 28px; gap: 24px; z-index: 200;
}
#setup.hidden { display: none; }

.s-logo {
  font-size: 1.8rem; font-weight: 700;
  letter-spacing: -.02em; text-align: center;
}
.s-logo small {
  display: block; font-size: .6rem; font-weight: 300;
  color: var(--mid); letter-spacing: .2em;
  text-transform: uppercase; margin-top: 6px;
}

/* Box setup: trasparente con solo contorno */
.s-box {
  width: 100%; max-width: 360px;
  background: transparent;
  border: 1px solid var(--brd);
  border-radius: var(--r);
  padding: 24px 22px;
}

.s-lbl {
  font-size: .58rem; font-weight: 400;
  color: var(--mid); letter-spacing: .16em;
  text-transform: uppercase;
  display: block; margin-bottom: 7px;
}

/* Input: trasparente, solo bordo */
.s-inp {
  width: 100%;
  background: transparent;
  border: 1px solid var(--brd);
  border-radius: 8px;
  padding: 12px 14px; color: var(--text);
  font-family: var(--mono); font-size: .82rem; font-weight: 300;
  outline: none; margin-bottom: 14px;
  transition: border-color .15s;
}
.s-inp:focus { border-color: var(--text); }
.s-inp::placeholder { color: var(--dim); }

.s-btn {
  width: 100%; background: var(--text); color: var(--bg);
  border: none; border-radius: 8px; padding: 14px;
  font-family: var(--mono); font-size: .78rem;
  font-weight: 700; letter-spacing: .1em;
  text-transform: uppercase; cursor: pointer;
}
.s-btn:active { opacity: .85; }

.s-note {
  font-size: .62rem; font-weight: 300;
  color: var(--dim); text-align: center; line-height: 2;
}
.s-note a { color: var(--mid); }

/* ══════════════════════════════
   HOME
══════════════════════════════ */
#home {
  position: fixed; inset: 0;
  display: none; flex-direction: column;
}

/* ── BARRA METEO TOP ── */
.weather-bar {
  flex-shrink: 0; height: 48px;
  background: transparent;
  border-bottom: 1px solid var(--brd2);
  overflow: hidden;
}
.weather-scroll {
  display: flex; align-items: center;
  height: 100%; white-space: nowrap;
  animation: scroll-left 32s linear infinite;
  will-change: transform;
}
.weather-scroll:hover { animation-play-state: paused; }
@keyframes scroll-left {
  from { transform: translateX(0); }
  to   { transform: translateX(-50%); }
}
.w-item {
  display: inline-flex; align-items: center;
  gap: 10px; margin-right: 56px;
  font-size: .88rem; font-weight: 300; color: var(--mid);
}
.w-item .w-loc  { font-weight: 700; color: var(--text); }
.w-item .w-temp { font-weight: 700; color: var(--text); font-size: .96rem; }
.w-item .w-desc { color: var(--mid); }
.w-item .w-icon { display: flex; align-items: center; }
.w-sep {
  display: inline-block; width: 1px; height: 12px;
  background: var(--brd); margin-right: 48px;
  vertical-align: middle;
}

/* ── CORPO — orologio centrato ── */
.clock-body {
  flex: 1; display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  position: relative; overflow: hidden;
  gap: 0;
}
/* Glow palette sottile */
.clock-body::before {
  content: '';
  position: absolute; top: 50%; left: 50%;
  transform: translate(-50%,-50%);
  width: 120vmax; height: 120vmax;
  background: conic-gradient(
    from 0deg,
    #ff2d5504, #ff6b0004 60deg, #ffd60a04 120deg,
    #30d15804 180deg, #0a84ff04 240deg, #bf5af204 300deg, #ff2d5504
  );
  border-radius: 50%;
  animation: spin 90s linear infinite;
  pointer-events: none;
}
@keyframes spin { to { transform: translate(-50%,-50%) rotate(360deg); } }

/* Orologio HH:MM:SS */
.clock-digits {
  display: flex; align-items: baseline;
  position: relative; z-index: 1;
  order: 2;
}
.clock-hms {
  font-family: var(--clock);
  font-size: clamp(1.56rem, 11.7vw, 5.85rem);
  font-weight: 400; line-height: 1;
  letter-spacing: -.12em; color: var(--text);
  transition: text-shadow 3s ease;
}
.clock-sep {
  font-family: var(--sep);
  font-size: clamp(1.17rem, 9.1vw, 4.55rem);
  font-weight: 400; color: var(--brd);
  line-height: 1; padding: 0 2px;
  animation: blink 1s step-start infinite;
}
@keyframes blink { 50% { opacity: .1; } }

.clock-date {
  font-size: clamp(.75rem, 2.2vw, 1rem);
  font-weight: 300; color: var(--mid);
  letter-spacing: .04em;
  margin-top: 0;
  margin-bottom: 14px; /* distanza minima dall'orologio */
  position: relative; z-index: 1;
  order: 1; /* va sopra le cifre nel flex column */
}

/* Badge scadenze */
.due-badge {
  position: absolute; top: 14px; right: 16px;
  background: transparent;
  border: 1px solid #ff3b30; color: #ff3b30;
  font-size: .58rem; font-weight: 700;
  letter-spacing: .08em; text-transform: uppercase;
  padding: 5px 12px; border-radius: 20px;
  cursor: pointer; z-index: 2;
  animation: fadeIn .3s ease;
}
@keyframes fadeIn { from{opacity:0;transform:translateY(-4px)} to{opacity:1;transform:translateY(0)} }

/* ── MICROFONO ── */
.mic-area {
  display: flex; flex-direction: column;
  align-items: center; gap: 8px;
  margin-top: 28px; position: relative; z-index: 1;
  order: 3;
}
.mic-ring-wrap { position: relative; width: 54px; height: 54px; }
.mic-ring {
  position: absolute; inset: -6px;
  border-radius: 50%; border: 1px solid transparent;
  pointer-events: none;
}
.mic-btn {
  position: absolute; inset: 0;
  border-radius: 50%;
  border: 1px solid var(--brd);
  background: transparent; color: var(--dim);
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: all .2s;
}
/* stati microfono */
.state-wake-active .mic-btn  { border-color: var(--brd); color: var(--mid); }
.state-wake-active .mic-ring { border-color: var(--brd2); animation: ringrot 4s linear infinite; }
.state-listening  .mic-btn   { border-color: var(--text); background: var(--text); color: var(--bg); }
.state-thinking   .mic-btn   { border-color: var(--mid); color: var(--mid); }
.state-speaking   .mic-btn   { border-color: #30d158; color: #30d158; }
.state-speaking   .mic-ring  { border-color: #30d15830; animation: ringrot 1.2s linear infinite; }
@keyframes ringrot { to { transform: rotate(360deg); } }

.mic-lbl {
  font-size: .54rem; font-weight: 400;
  color: var(--mid); letter-spacing: .12em;
  text-transform: uppercase; min-height: 12px; text-align: center;
}
.mic-hint {
  font-size: .5rem; font-weight: 300;
  color: var(--dim); letter-spacing: .08em;
}

/* ── NAVBAR BOTTOM ── */
.navbar {
  flex-shrink: 0; height: 68px;
  background: transparent;
  border-top: 1px solid var(--brd2);
  display: flex; align-items: stretch;
}
.nb-btn {
  flex: 1; background: transparent; border: none;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 4px; cursor: pointer; color: var(--dim);
  transition: color .15s;
}
.nb-btn:active { color: var(--text); }
.nb-icon { width: 22px; height: 22px; color: inherit; }
.nb-lbl  { font-size: .6rem; font-weight: 400; letter-spacing: .08em; text-transform: uppercase; }

/* ══════════════════════════════
   PANELS
══════════════════════════════ */
.panel {
  position: fixed; inset: 0;
  background: var(--bg); z-index: 50;
  display: flex; flex-direction: column;
  transform: translateY(100%);
  transition: transform .28s cubic-bezier(.4,0,.2,1);
}
.panel.open { transform: translateY(0); }

.panel-hdr {
  display: flex; align-items: center; justify-content: space-between;
  padding: 16px 20px;
  border-bottom: 1px solid var(--brd2);
  flex-shrink: 0;
}
.panel-title {
  font-size: .72rem; font-weight: 700;
  letter-spacing: .14em; text-transform: uppercase;
}
.panel-close {
  font-family: var(--mono); font-size: .6rem; font-weight: 400;
  color: var(--mid); background: transparent;
  border: 1px solid var(--brd); border-radius: 6px;
  padding: 6px 14px; cursor: pointer;
  letter-spacing: .08em; text-transform: uppercase;
  transition: all .15s;
}
.panel-close:active { background: var(--text); color: var(--bg); border-color: var(--text); }

/* Chat */
.chat-area {
  flex: 1; padding: 16px 18px;
  overflow-y: auto;
  display: flex; flex-direction: column; gap: 10px;
}
.msg {
  max-width: 88%; padding: 11px 15px;
  font-size: .86rem; font-weight: 300; line-height: 1.7;
  animation: fadeIn .2s ease;
}
/* Messaggio AI: contorno bianco, trasparente */
.msg.ai {
  background: transparent;
  border: 1px solid var(--brd);
  border-radius: 4px 14px 14px 4px;
  align-self: flex-start;
}
.msg.ai .lbl {
  font-size: .54rem; font-weight: 400;
  color: var(--dim); letter-spacing: .14em;
  text-transform: uppercase; margin-bottom: 6px;
}
/* Messaggio utente: sfondo bianco pieno */
.msg.user {
  background: var(--text); color: var(--bg);
  align-self: flex-end; font-weight: 500;
  border-radius: 14px 4px 4px 14px;
}
.typing {
  display: none; align-items: center; gap: 5px;
  padding: 11px 15px;
  background: transparent; border: 1px solid var(--brd2);
  border-radius: 4px 14px 14px 4px;
  width: fit-content;
}
.typing.on { display: flex; }
.dot {
  width: 4px; height: 4px;
  background: var(--dim); border-radius: 50%;
  animation: db 1.2s infinite;
}
.dot:nth-child(2){animation-delay:.2s}
.dot:nth-child(3){animation-delay:.4s}
@keyframes db {
  0%,60%,100%{transform:translateY(0);opacity:.3}
  30%{transform:translateY(-5px);opacity:1}
}

.cp-row {
  display: flex; gap: 10px;
  padding: 12px 16px 22px;
  border-top: 1px solid var(--brd2);
  flex-shrink: 0;
}
.cp-inp {
  flex: 1; background: transparent;
  border: 1px solid var(--brd); border-radius: 10px;
  padding: 12px 14px; color: var(--text);
  font-family: var(--mono); font-size: .86rem; font-weight: 300;
  outline: none; resize: none;
  min-height: 44px; max-height: 110px; line-height: 1.5;
  transition: border-color .15s;
}
.cp-inp:focus { border-color: var(--text); }
.cp-inp::placeholder { color: var(--dim); font-size: .8rem; }
.cp-send {
  width: 44px; height: 44px;
  background: var(--text); color: var(--bg);
  border: none; border-radius: 10px;
  cursor: pointer; font-size: 1.1rem; font-weight: 700;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}

/* Archivio */
.arch-toolbar {
  display: flex; gap: 8px;
  padding: 14px 16px 0; flex-shrink: 0;
}
.arch-search {
  flex: 1; background: transparent;
  border: 1px solid var(--brd); border-radius: 8px;
  padding: 9px 13px; color: var(--text);
  font-family: var(--mono); font-size: .78rem; font-weight: 300;
  outline: none; transition: border-color .15s;
}
.arch-search:focus { border-color: var(--text); }
.arch-search::placeholder { color: var(--dim); }

.arch-filter {
  background: transparent; border: 1px solid var(--brd);
  border-radius: 8px; padding: 0 12px;
  color: var(--mid); font-family: var(--mono);
  font-size: .6rem; font-weight: 400;
  letter-spacing: .1em; text-transform: uppercase;
  cursor: pointer; white-space: nowrap;
  transition: all .15s;
}
.arch-filter.active { background: var(--text); color: var(--bg); border-color: var(--text); }

.arch-list { flex: 1; overflow-y: auto; padding: 14px 16px; }

.arch-empty {
  text-align: center; color: var(--dim);
  font-size: .66rem; font-weight: 300;
  letter-spacing: .1em; margin-top: 60px; line-height: 2.4;
}

/* Entry archivio: trasparente con contorno bianco */
.arch-entry {
  background: transparent;
  border: 1px solid var(--brd);
  border-radius: var(--r);
  padding: 14px 16px; margin-bottom: 10px;
  position: relative; overflow: hidden;
  transition: border-color .2s;
}
/* Linea colorata in cima alla card */
.arch-entry::before {
  content: '';
  position: absolute; top: 0; left: 0; right: 0;
  height: 2px; background: var(--ic, var(--brd));
}
.arch-entry:active { border-color: var(--text); }

.arch-entry-top {
  display: flex; align-items: flex-start;
  justify-content: space-between; gap: 12px;
}
.arch-entry-title { font-size: .92rem; font-weight: 700; line-height: 1.2; }
.arch-entry-date {
  font-size: .58rem; font-weight: 300;
  color: var(--mid); white-space: nowrap;
  margin-top: 2px; text-align: right;
}
.arch-entry-cat {
  display: inline-block;
  font-size: .52rem; font-weight: 700;
  letter-spacing: .12em; text-transform: uppercase;
  padding: 3px 9px;
  border: 1px solid var(--ic, var(--brd));
  border-radius: 20px; margin-top: 8px;
  background: transparent;
}
.arch-entry-note {
  font-size: .76rem; font-weight: 300;
  color: var(--mid); line-height: 1.6; margin-top: 8px;
}
.arch-entry-del {
  font-family: var(--mono); font-size: .54rem; font-weight: 400;
  letter-spacing: .08em; text-transform: uppercase;
  background: transparent;
  border: 1px solid var(--brd2);
  border-radius: 6px; color: var(--dim);
  padding: 5px 10px; cursor: pointer; margin-top: 10px;
  transition: all .15s;
}
.arch-entry-del:active { border-color: #ff3b30; color: #ff3b30; }

.arch-add-bar {
  padding: 12px 16px 22px;
  border-top: 1px solid var(--brd2);
  display: flex; gap: 8px; flex-shrink: 0;
}
.arch-add-inp {
  flex: 1; background: transparent;
  border: 1px solid var(--brd); border-radius: 10px;
  padding: 12px 14px; color: var(--text);
  font-family: var(--mono); font-size: .82rem; font-weight: 300;
  outline: none; transition: border-color .15s;
}
.arch-add-inp:focus { border-color: var(--text); }
.arch-add-inp::placeholder { color: var(--dim); font-size: .78rem; }
.arch-add-btn {
  background: var(--text); color: var(--bg);
  border: none; border-radius: 10px; padding: 0 20px;
  font-family: var(--mono); font-size: .82rem;
  font-weight: 700; cursor: pointer;
}

/* Dialog archivio */
#arch-dialog {
  position: fixed; inset: 0;
  background: rgba(0,0,0,.88);
  z-index: 80; display: none; align-items: flex-end;
  backdrop-filter: blur(6px);
}
#arch-dialog.open { display: flex; }
.adlg-box {
  width: 100%; background: var(--bg);
  border-top: 1px solid var(--brd);
  border-radius: 18px 18px 0 0;
  padding: 14px 18px 36px;
}
.adlg-handle {
  width: 38px; height: 3px;
  background: var(--brd); border-radius: 2px;
  margin: 0 auto 18px;
}
.adlg-title {
  font-size: .72rem; font-weight: 700;
  letter-spacing: .14em; text-transform: uppercase;
  margin-bottom: 16px;
}
.adlg-field { display: flex; flex-direction: column; gap: 6px; margin-bottom: 12px; }
.adlg-lbl {
  font-size: .56rem; font-weight: 400;
  color: var(--mid); letter-spacing: .12em; text-transform: uppercase;
}
.adlg-inp {
  background: transparent; border: 1px solid var(--brd);
  border-radius: 8px; padding: 11px 13px; color: var(--text);
  font-family: var(--mono); font-size: .82rem; font-weight: 300;
  outline: none; width: 100%; transition: border-color .15s;
}
.adlg-inp:focus { border-color: var(--text); }
.adlg-textarea {
  background: transparent; border: 1px solid var(--brd);
  border-radius: 8px; padding: 11px 13px; color: var(--text);
  font-family: var(--mono); font-size: .82rem; font-weight: 300;
  outline: none; width: 100%; resize: none; height: 80px;
  line-height: 1.5; transition: border-color .15s;
}
.adlg-textarea:focus { border-color: var(--text); }
.adlg-sel {
  background: transparent; border: 1px solid var(--brd);
  border-radius: 8px; padding: 11px 13px; color: var(--text);
  font-family: var(--mono); font-size: .82rem; font-weight: 300;
  outline: none; width: 100%; appearance: none;
}
.adlg-row { display: flex; gap: 10px; margin-top: 8px; }
.adlg-btn {
  flex: 1; padding: 13px; border-radius: 10px;
  font-family: var(--mono); font-size: .72rem;
  font-weight: 700; letter-spacing: .1em;
  text-transform: uppercase; cursor: pointer; border: none;
}
.adlg-btn.cancel  { background: transparent; border: 1px solid var(--brd); color: var(--mid); }
.adlg-btn.confirm { background: var(--text); color: var(--bg); }

/* Toast */
.toast {
  position: fixed; bottom: 70px; left: 50%;
  transform: translateX(-50%) translateY(8px);
  background: var(--text); color: var(--bg);
  padding: 9px 20px; border-radius: 20px;
  font-family: var(--mono); font-size: .65rem;
  font-weight: 700; letter-spacing: .06em;
  opacity: 0; transition: all .2s; z-index: 300;
  white-space: nowrap;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* ══════════════════════════════════════════════════════
   LANDSCAPE — telefono ruotato

   LAYOUT:
     [data]       ← sopra l'orologio (posizione assoluta)
     [HH:MM:SS]   ← centrato verticalmente (flow normale)
     [mic]        ← sotto l'orologio (posizione assoluta)

   PER MODIFICARE L'OROLOGIO: cambia il vh (es. 28vh → 32vh)
   PER SPOSTARE LA DATA: modifica top in .clock-date landscape
   PER SPOSTARE IL MIC: modifica top in .mic-area landscape
══════════════════════════════════════════════════════ */
@media (orientation: landscape) {

  /* Il corpo centra solo l'orologio — data e mic
     si posizionano in assoluto attorno a esso */
  .clock-body {
    position: relative;
    justify-content: center;
  }

  /* Orologio centrato con vh */
  .clock-hms { font-size: clamp(2.7rem, 25.2vh, 8.1rem); }
  .clock-sep { font-size: clamp(1.98rem, 18.9vh, 6.12rem); }

  /* DATA — sopra l'orologio in posizione assoluta
     top: 50% = centro; poi saliamo di circa 30vh (metà cifre) + gap */
  .clock-date {
    position: absolute;
    top: calc(50% - 12.6vh - 1rem - 14px);
    left: 0; right: 0;
    text-align: center;
    margin-top: 0;
    margin-bottom: 0;
    font-size: .8rem;
    z-index: 2;
  }

  /* MIC — sotto l'orologio in posizione assoluta */
  .mic-area {
    position: absolute;
    top: calc(50% + 18vh);
    left: 0; right: 0;
    align-items: center;
    margin-top: 0;
    gap: 4px;
    z-index: 2;
  }

  .mic-ring-wrap { width: 42px; height: 42px; }
  .mic-lbl       { font-size: .48rem; }
  .mic-hint      { font-size: .42rem; }

  /* Barra e navbar compatte */
  .weather-bar { height: 38px; }
  .w-item      { font-size: .74rem; gap: 8px; margin-right: 40px; }
  .navbar      { height: 54px; }
  .nb-icon     { width: 18px; height: 18px; }
  .nb-lbl      { font-size: .5rem; }

  .panel-hdr    { padding: 10px 16px; }
  .cp-row       { padding: 8px 12px 14px; }
  .arch-toolbar { padding: 8px 12px 0; }
  .arch-add-bar { padding: 8px 12px 14px; }
}

/* Landscape schermi bassi < 450px (telefoni standard ruotati) */
@media (orientation: landscape) and (max-height: 450px) {

  .clock-hms { font-size: clamp(2.52rem, 27.0vh, 7.2rem); }
  .clock-sep { font-size: clamp(1.8rem, 19.8vh, 5.4rem); }

  /* Ricalcola posizioni per cifre più piccole */
  .clock-date { top: calc(50% - 13.5vh - 0.85rem - 14px); font-size: .72rem; margin-bottom: 0; }

<script>
// ╔══════════════════════════════════════════════════════════════╗
// ║                    CASA — ASSISTENTE DOMESTICO               ║
// ║                                                              ║
// ║  STRUTTURA DEL CODICE:                                       ║
// ║  1. STORAGE      — salvataggio dati nel browser              ║
// ║  2. GLOBALS      — variabili condivise tra le funzioni        ║
// ║  3. SETUP        — avvio e configurazione iniziale           ║
// ║  4. PANELS       — apertura/chiusura pannelli slide-up       ║
// ║  5. CLOCK        — orologio aggiornato ogni secondo          ║
// ║  6. WEATHER      — meteo da open-meteo.com                   ║
// ║  7. ARCHIVIO     — gestione interventi di manutenzione       ║
// ║  8. AI           — comunicazione con Claude API              ║
// ║  9. WAKE WORD    — rilevamento "Claude" nel parlato          ║
// ║  10. TTS         — sintesi vocale (ElevenLabs o browser)     ║
// ║  11. UTILITIES   — fullscreen, toast, ecc.                   ║
// ╚══════════════════════════════════════════════════════════════╝


// ══════════════════════════════════════════════
// 1. STORAGE — Persistenza dati nel localStorage
//
// localStorage è un database chiave-valore nel browser.
// I dati rimangono anche dopo la chiusura dell'app.
// Vengono persi solo se si svuota la cache del browser.
//
// CHIAVI USATE:
//   'casa_key'       → API key di Claude
//   'el_key'         → API key di ElevenLabs
//   'el_voice'       → Voice ID di ElevenLabs
//   'casa_archivio_v1' → array JSON degli interventi
// ══════════════════════════════════════════════

const AKEY = 'casa_archivio_v1'; // chiave per l'archivio interventi

// Carica l'archivio dal localStorage. Se non esiste o è corrotto, restituisce array vuoto.
function loadArch(){
  try{ return JSON.parse(localStorage.getItem(AKEY)||'[]'); }
  catch{ return []; }
}

// Salva l'archivio nel localStorage e sincronizza con Supabase se disponibile
function saveArch(l){
  localStorage.setItem(AKEY, JSON.stringify(l));
  if(sbKey) syncToCloud(l); // fire-and-forget
}

// Variabile globale con tutti gli interventi caricati all'avvio
let archivio = loadArch();


// ══════════════════════════════════════════════
// 2. GLOBALS — Variabili condivise tra le funzioni
//
// Queste variabili sono accessibili da tutte le funzioni.
// Modificarle qui cambia il comportamento globale dell'app.
// ══════════════════════════════════════════════

// Coordinate GPS di Contrada Cervare, Macerata (usate per il meteo)
// Per cambiare città: trova lat/lon su maps.google.com e aggiorna qui
const LAT  = 43.2832;
const LON  = 13.4534;
const CITY = 'Contrada Cervare, Macerata';

// Chiavi API — vengono caricate dal localStorage in window.onload
let apiKey  = '';  // Claude API key
let elKey   = '';  // ElevenLabs API key
let elVoice = '';  // ElevenLabs Voice ID

// Supabase — cloud sync archivio
// URL tabella fisso (il nome tabella è 'Archivio' con A maiuscola come creata)
const SB_URL    = 'https://thmoyxfkgtkteajzande.supabase.co/rest/v1/Archivio';
// SB_CONFIG rimosso — le chiavi non vengono mai salvate sul cloud
let sbKey = ''; // anon key — inserita nel setup

// Stato della conversazione con Claude
// È un array di oggetti {role: 'user'|'assistant', content: '...'}
// Viene inviato ad ogni chiamata per mantenere il contesto
let chatHistory = [];

// Ultimo dato meteo ricevuto dall'API (oggetto JSON di open-meteo)
let weatherData = null;

// Stato del microfono/TTS
let isSpeaking = false;         // true se sta parlando via TTS
let wakeEnabled = false;        // true se il wake word è attivo
let wakeRecognition = null;     // istanza corrente di SpeechRecognition
let currentState = 'idle';      // stato UI microfono: idle | wake-active | listening | thinking | speaking

// Filtro attivo nell'archivio
let archFilter = 'all';

// Palette colori per il glow dell'orologio — un colore per ogni ora del giorno (0-23)
// Modifica questi valori hex per cambiare i colori del glow
const PAL = [
  '#5e5ce6', // 00 — mezzanotte: indaco
  '#5e5ce6', // 01
  '#5e5ce6', // 02
  '#5e5ce6', // 03
  '#5e5ce6', // 04
  '#ffd60a', // 05 — prima alba: giallo
  '#ffd60a', // 06 — alba: giallo
  '#ff6b00', // 07 — mattina presto: arancio
  '#30d158', // 08 — mattina: verde
  '#30d158', // 09
  '#30d158', // 10
  '#0a84ff', // 11 — tarda mattina: blu
  '#0a84ff', // 12 — mezzogiorno: blu
  '#0a84ff', // 13
  '#0a84ff', // 14
  '#ff6b00', // 15 — pomeriggio: arancio
  '#ff6b00', // 16
  '#ff2d55', // 17 — sera: rosso
  '#ff2d55', // 18
  '#ff2d55', // 19
  '#bf5af2', // 20 — sera tarda: viola
  '#bf5af2', // 21
  '#bf5af2', // 22
  '#5e5ce6', // 23 — notte: indaco
];

// Colori per categoria nell'archivio interventi
// Modifica questi hex per cambiare i colori delle categorie
const CAT_COLORS = {
  manutenzione: '#0a84ff', // blu
  pulizia:      '#30d158', // verde
  impianto:     '#ffd60a', // giallo
  riparazione:  '#ff2d55', // rosso
  acquisto:     '#bf5af2', // viola
  altro:        '#555555'  // grigio
};


// ══════════════════════════════════════════════
// 3. SETUP — Configurazione iniziale e avvio
// ══════════════════════════════════════════════

// Chiamata al click su "Attiva →" nella schermata di setup.
// Valida la chiave Claude, salva tutto nel localStorage, avvia l'app.
// Valida e salva le chiavi in localStorage (solo locale, mai sul cloud)
function saveAndStart(){
  const k = document.getElementById('api-input').value.trim();
  if(!k.startsWith('sk-ant-')){ showToast('Chiave Claude non valida'); return; }
  apiKey = k;
  localStorage.setItem('casa_key', k);

  const elk = document.getElementById('el-key-input').value.trim();
  const elv = document.getElementById('el-voice-input').value.trim();
  if(elk){ elKey=elk; localStorage.setItem('el_key', elk); }
  if(elv){ elVoice=elv; localStorage.setItem('el_voice', elv); }

  const sbk = document.getElementById('sb-key-input').value.trim();
  if(sbk){ sbKey=sbk; localStorage.setItem('sb_key', sbk); }

  boot();
}

// Avvia l'app: nasconde il setup, mostra la home, lancia tutti i moduli.
function boot(){
  document.getElementById('setup').classList.add('hidden');
  document.getElementById('home').style.display = 'flex';
  startClock();       // avvia l'orologio (aggiornamento ogni secondo)
  loadWeather();      // carica il meteo (poi si aggiorna ogni 30 min)
  renderArch();       // popola la lista archivio
  checkScadenze();    // controlla se ci sono scadenze imminenti (badge rosso)
  setTimeout(startWakeWord, 800);
  // Avvio controllo proattivo: aspetta 4s che meteo e archivio siano pronti
  setTimeout(controlloProattivo, 4000);
  setInterval(controlloProattivo, 2 * 60 * 60 * 1000);
  // Carica archivio da Supabase (sovrascrive localStorage se cloud più aggiornato)
  setTimeout(syncFromCloud, 1500);
}

// Resetta la configurazione: rimuove la chiave dal localStorage e ricarica la pagina.
// I dati dell'archivio NON vengono cancellati (hanno una chiave diversa).
function resetApp(){
  if(confirm('Cambiare configurazione?\nLe chiavi API verranno rimosse da questo dispositivo.')){
    ['casa_key','el_key','el_voice','sb_key'].forEach(k => localStorage.removeItem(k));
    location.reload();
  }
}

// Eseguita automaticamente quando la pagina finisce di caricare.
// Se la chiave è già salvata, salta il setup e va direttamente all'app.
window.onload = () => {
  const k = localStorage.getItem('casa_key');
  elKey   = localStorage.getItem('el_key')   || '';
  elVoice = localStorage.getItem('el_voice') || '';
  sbKey   = localStorage.getItem('sb_key')   || '';

  if(k){
    // Chiave già in localStorage → avvia direttamente senza mostrare setup
    apiKey = k; boot(); return;
  }

  // Prima volta: pre-popola i campi se già esistono
  if(elKey)   { const el=document.getElementById('el-key-input');   if(el) el.value=elKey; }
  if(elVoice) { const el=document.getElementById('el-voice-input'); if(el) el.value=elVoice; }
  if(sbKey)   { const el=document.getElementById('sb-key-input');   if(el) el.value=sbKey; }
};


// ══════════════════════════════════════════════
// 4. PANELS — Pannelli slide-up (Chat, Archivio)
//
// I pannelli sono div fissi che si trovano sotto lo schermo (translateY 100%)
// e salgono in vista aggiungendo la classe 'open' (translateY 0).
// La transizione CSS si occupa dell'animazione.
// ══════════════════════════════════════════════

// Apre un pannello dato il suo ID HTML
function openPanel(id){ document.getElementById(id).classList.add('open'); }

// Chiude un pannello dato il suo ID HTML
function closePanel(id){ document.getElementById(id).classList.remove('open'); }


// ══════════════════════════════════════════════
// 5. CLOCK — Orologio digitale aggiornato ogni secondo
//
// L'orologio mostra HH:MM:SS con un glow colorato
// che cambia in base all'ora del giorno (vedi array PAL).
//
// PER CAMBIARE IL FORMATO DATA: modifica la riga
// document.getElementById('clk-date').textContent = ...
// ══════════════════════════════════════════════

const GIORNI = ['Domenica','Lunedì','Martedì','Mercoledì','Giovedì','Venerdì','Sabato'];
const MESI   = ['Gennaio','Febbraio','Marzo','Aprile','Maggio','Giugno','Luglio','Agosto','Settembre','Ottobre','Novembre','Dicembre'];

// Avvia il ciclo orologio: chiama tick() subito e poi ogni 1000ms
function startClock(){ tick(); setInterval(tick, 1000); }

// Aggiorna le tre cifre dell'orologio (ore, minuti, secondi) e la data.
// Chiamata ogni secondo da setInterval.
function tick(){
  const n  = new Date();
  const hh = String(n.getHours()).padStart(2,'0');   // es. "08"
  const mm = String(n.getMinutes()).padStart(2,'0'); // es. "05"
  const ss = String(n.getSeconds()).padStart(2,'0'); // es. "30"

  // Aggiorna i tre span separati (h, m, s) nell'HTML
  document.getElementById('clk-h').textContent = hh;
  document.getElementById('clk-m').textContent = mm;
  document.getElementById('clk-s').textContent = ss;

  // Aggiorna la data nel formato "Lunedì 4 Giugno 2026"
  document.getElementById('clk-date').textContent =
    `${GIORNI[n.getDay()]} ${n.getDate()} ${MESI[n.getMonth()]} ${n.getFullYear()}`;

  // Applica il glow colorato basato sull'ora corrente
  // Il colore viene preso dall'array PAL[ora] (24 valori, uno per ora)
  const col = PAL[n.getHours()];
  ['clk-h','clk-m','clk-s'].forEach(id=>{
    document.getElementById(id).style.textShadow = `0 0 80px ${col}35`;
    // 35 in fondo è l'opacità in hex (circa 21%) — aumenta per un glow più forte
  });
}

// Dati richiesti: temperatura, umidità, codice meteo, vento
// Aggiornamento automatico: ogni 30 minuti

// Restituisce un SVG inline (14x14px, linee bianche) in base al codice WMO
// I codici WMO sono standard internazionali per le condizioni meteo:
// 0=sereno, 1-3=nuvole, 45-48=nebbia, 51-67=pioggia, 71-77=neve, 80-82=rovesci, 95+=temporale
function wIcon(c){
  // Helper: crea un SVG con il path dato
  const s = (d) => `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">${d}</svg>`;
  if(c===0)  return s('<circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>'); // sole
  if(c<=2)   return s('<path d="M18 10h-1.26A8 8 0 1 0 9 20h9a5 5 0 0 0 0-10z"/><circle cx="12" cy="7" r="3"/>');  // parz. nuvoloso
  if(c<=3)   return s('<path d="M18 10h-1.26A8 8 0 1 0 9 20h9a5 5 0 0 0 0-10z"/>');                                 // nuvoloso
  if(c<=48)  return s('<line x1="1" y1="22" x2="23" y2="22"/><path d="M5 19H3a2 2 0 0 1 0-4h.09A6 6 0 0 1 15 9.09A5 5 0 0 1 21 14h-1"/><line x1="8" y1="22" x2="8" y2="19"/><line x1="12" y1="22" x2="12" y2="17"/><line x1="16" y1="22" x2="16" y2="19"/>'); // nebbia
  if(c<=67)  return s('<line x1="16" y1="13" x2="16" y2="21"/><line x1="8" y1="13" x2="8" y2="21"/><line x1="12" y1="15" x2="12" y2="23"/><path d="M20 16.58A5 5 0 0 0 18 7h-1.26A8 8 0 1 0 4 15.25"/>'); // pioggia
  if(c<=77)  return s('<polyline points="23 18 17 12 13 16 9 12 3 18"/><path d="M20 6.58A5 5 0 0 0 18 7h-1.26A8 8 0 1 0 4 15.25"/>'); // neve
  if(c<=82)  return s('<line x1="16" y1="13" x2="16" y2="21"/><line x1="8" y1="13" x2="8" y2="21"/><line x1="12" y1="15" x2="12" y2="23"/><path d="M20 16.58A5 5 0 0 0 18 7h-1.26A8 8 0 1 0 4 15.25"/>'); // rovesci
  return s('<path d="M19 16.9A5 5 0 0 0 18 7h-1.26a8 8 0 1 0-11.62 9"/><polyline points="13 11 9 17 15 17 11 23"/>'); // temporale
}

// Converte un codice WMO in descrizione italiana
function wDesc(c){
  const m = {
    0:'Sereno', 1:'Prev. sereno', 2:'Parz. nuvoloso', 3:'Nuvoloso',
    45:'Nebbia', 51:'Pioggerella', 61:'Pioggia leggera', 63:'Pioggia',
    65:'Pioggia intensa', 71:'Neve leggera', 73:'Neve',
    80:'Rovesci', 95:'Temporale'
  };
  return m[c] || 'Variabile';
}

// Aggiorna la barra meteo (sia la copia originale che quella duplicata per il loop).
// La barra contiene il contenuto duplicato per creare l'animazione di scorrimento infinito.
function setWeatherBar(icon, temp, desc, extra){
  ['','2'].forEach(s=>{
    document.getElementById('w-icon'+s).innerHTML = icon; // SVG inline
    document.getElementById('w-temp'+s).textContent = temp;
    document.getElementById('w-desc'+s).textContent = desc;
    document.getElementById('w-extra-txt'+s).textContent = extra;
  });
}

// Carica i dati meteo dall'API open-meteo (gratuita, senza chiave).
// In caso di errore mostra "Non disponibile" e riprova dopo 30 min.
async function loadWeather(){
  try{
    const r = await fetch(
      `https://api.open-meteo.com/v1/forecast` +
      `?latitude=${LAT}&longitude=${LON}` +
      `&current=temperature_2m,relative_humidity_2m,weather_code,wind_speed_10m` +
      `&daily=temperature_2m_max,temperature_2m_min,precipitation_sum` +
      `&timezone=Europe%2FRome&forecast_days=3`
    );
    const d = await r.json();
    if(!d.current) throw new Error('Dati meteo mancanti');

    weatherData = d; // salva per uso nel system prompt AI
    const c  = d.current;  // dati correnti
    const dy = d.daily;    // previsioni giornaliere

    // Componi i testi per la barra scorrevole
    const icon  = wIcon(c.weather_code);
    const temp  = `${Math.round(c.temperature_2m)}°`;
    const desc  = wDesc(c.weather_code);
    // Extra: umidità, vento, min/max oggi, previsione domani
    const extra = `💧 ${c.relative_humidity_2m}%  🌬 ${Math.round(c.wind_speed_10m)} km/h  ↑${Math.round(dy.temperature_2m_max[0])}° ↓${Math.round(dy.temperature_2m_min[0])}°  ·  Domani ↑${Math.round(dy.temperature_2m_max[1])}° ↓${Math.round(dy.temperature_2m_min[1])}°`;

    setWeatherBar(icon, temp, desc, extra);

    // Ricarica dopo 30 minuti (30 * 60 * 1000 millisecondi)
    setTimeout(loadWeather, 30 * 60 * 1000);

  }catch(e){
    setWeatherBar('—', '—°', 'Non disponibile', '');
    console.warn('Errore meteo:', e);
    // Riprova dopo 5 minuti in caso di errore
    setTimeout(loadWeather, 5 * 60 * 1000);
  }
}

// Restituisce un riassunto meteo testuale da includere nel system prompt di Claude.
// Così l'AI sa le condizioni attuali e può fare suggerimenti contestuali.
function weatherSummary(){
  if(!weatherData) return 'Meteo non disponibile.';
  const c = weatherData.current;
  const d = weatherData.daily;
  return `${wDesc(c.weather_code)}, ${Math.round(c.temperature_2m)}°C. ` +
         `Max ${Math.round(d.temperature_2m_max[0])}°, min ${Math.round(d.temperature_2m_min[0])}°. ` +
         `Domani max ${Math.round(d.temperature_2m_max[1])}°.`;
}

// 7. ARCHIVIO — Gestione interventi di manutenzione
//
// Ogni intervento è un oggetto con questi campi:
//   id      → timestamp univoco (Date.now())
//   titolo  → nome dell'intervento (es. "Sostituzione filtro caldaia")
//   cat     → categoria (manutenzione|pulizia|impianto|riparazione|acquisto|altro)
//   data    → data esecuzione (formato YYYY-MM-DD)
//   note    → testo libero (prodotto usato, costo, osservazioni)
//   scad    → data prossima scadenza (YYYY-MM-DD, opzionale)
//
// I dati sono salvati in localStorage con chiave AKEY.
// ══════════════════════════════════════════════

// Imposta il filtro categoria attivo e aggiorna la lista.
// f può essere: 'all', 'manutenzione', 'pulizia', 'impianto'
function setFilter(f){
  archFilter = f;
  // Rimuovi la classe 'active' da tutti i bottoni filtro
  document.querySelectorAll('.arch-filter').forEach(b => b.classList.remove('active'));
  // Aggiungi 'active' al bottone corrispondente
  const map = { all:'filt-all', manutenzione:'filt-man', pulizia:'filt-pul', impianto:'filt-imp' };
  const btn = document.getElementById(map[f] || 'filt-all');
  if(btn) btn.classList.add('active');
  renderArch();
}

// Renderizza la lista degli interventi nel pannello archivio.
// Applica filtro categoria e ricerca testuale, ordina per data decrescente.
function renderArch(){
  const el = document.getElementById('arch-list');

  // Leggi il termine di ricerca (campo input in cima al pannello)
  const q = (document.getElementById('arch-search') || {value:''}).value.toLowerCase().trim();

  // Parti dall'archivio completo, ordinato dal più recente
  let list = [...archivio].sort((a,b) => { const da=a.data?new Date(a.data):new Date(0); const db=b.data?new Date(b.data):new Date(0); return db-da; });

  // Applica filtro categoria se non 'all'
  if(archFilter !== 'all') list = list.filter(e => e.cat === archFilter);

  // Applica filtro ricerca su titolo e note
  if(q) list = list.filter(e =>
    e.titolo.toLowerCase().includes(q) || (e.note||'').toLowerCase().includes(q)
  );

  // Nessun risultato → messaggio vuoto
  if(!list.length){
    el.innerHTML = '<div class="arch-empty">Nessun intervento registrato.<br>Aggiungi il primo qui sotto.</div>';
    return;
  }

  // Genera l'HTML per ogni intervento
  el.innerHTML = list.map(e => {
    const col     = CAT_COLORS[e.cat] || '#555';
    const dataStr = e.data
      ? new Date(e.data+'T00:00:00').toLocaleDateString('it-IT', {day:'2-digit', month:'short', year:'numeric'})
      : 'Data sconosciuta';
    const scadStr     = e.scad
      ? '· Prossima: ' + new Date(e.scad+'T00:00:00').toLocaleDateString('it-IT', {day:'2-digit', month:'short', year:'numeric'})
      : '';
    // Controlla se la scadenza è già passata
    const scadExpired = e.scad && new Date(e.scad) < new Date();

    return `<div class="arch-entry" style="--ic:${col}">
      <div class="arch-entry-top">
        <div class="arch-entry-title">${e.titolo}</div>
        <div class="arch-entry-date">${dataStr} ${scadStr}</div>
      </div>
      <span class="arch-entry-cat" style="background:${col}22;color:${col}">${e.cat}</span>
      ${e.note ? `<div class="arch-entry-note">${e.note}</div>` : ''}
      ${scadExpired ? `<div class="arch-entry-note" style="color:#ff2d55;margin-top:4px">⚠ Scadenza superata</div>` : ''}
      <div style="display:flex;gap:6px;margin-top:10px">
        <button class="arch-entry-del" onclick="modificaArch('${e.id}')">Modifica</button>
        <button class="arch-entry-del" onclick="eliminaArch('${e.id}')">Elimina</button>
      </div>
    </div>`;
  }).join('');
}

// Controlla se ci sono scadenze nei prossimi 7 giorni e aggiorna il badge sull'orologio.
// Il badge rosso appare sopra l'orologio con il numero di scadenze imminenti.
function checkScadenze(){
  const oggi   = new Date(); oggi.setHours(0,0,0,0);
  const tra7gg = new Date(oggi.getTime() + 7 * 86400000); // oggi + 7 giorni

  // Filtra gli interventi con scadenza entro 7 giorni (incluse quelle già passate)
  const scad = archivio.filter(e =>
    e.scad && new Date(e.scad+'T00:00:00') <= tra7gg
  );

  document.getElementById('due-corner').innerHTML = scad.length > 0
    ? `<div class="due-badge" onclick="openPanel('att-panel')">${scad.length} in scadenza</div>`
    : '';
}

// Apre il dialog per un nuovo intervento.
// Se c'è testo nel campo input, lo pre-popola come titolo.
function openArchDialog(){
  const inp    = document.getElementById('arch-input');
  const titolo = inp ? inp.value.trim() : '';
  if(inp) inp.value = '';

  // Modalità: nuovo intervento
  document.getElementById('ad-id').value     = '';
  document.getElementById('adlg-title').textContent = 'Nuovo Intervento';
  document.getElementById('adlg-confirm').textContent = 'Salva →';
  document.getElementById('ad-titolo').value = titolo;
  document.getElementById('ad-note').value   = '';
  document.getElementById('ad-data').value   = '';
  document.getElementById('ad-scad').value   = '';
  document.getElementById('ad-cat').value    = 'manutenzione';

  document.getElementById('arch-dialog').classList.add('open');
}

// Apre il dialog in modalità modifica, pre-popolato con i dati esistenti
function modificaArch(id){
  const e = archivio.find(x => x.id === id);
  if(!e) return;

  document.getElementById('ad-id').value     = id;
  document.getElementById('adlg-title').textContent = 'Modifica Intervento';
  document.getElementById('adlg-confirm').textContent = 'Aggiorna →';
  document.getElementById('ad-titolo').value = e.titolo;
  document.getElementById('ad-note').value   = e.note || '';
  document.getElementById('ad-data').value   = e.data  || '';
  document.getElementById('ad-scad').value   = e.scad  || '';
  document.getElementById('ad-cat').value    = e.cat   || 'manutenzione';

  document.getElementById('arch-dialog').classList.add('open');
}

// Chiude il dialog senza salvare
function closeArchDialog(){
  document.getElementById('arch-dialog').classList.remove('open');
}

// Salva il dialog: crea un nuovo intervento o aggiorna uno esistente
// a seconda che ad-id sia vuoto o contenga un ID.
function salvaArch(){
  const titolo = document.getElementById('ad-titolo').value.trim();
  if(!titolo){ showToast('Inserisci un titolo'); return; }

  const id = document.getElementById('ad-id').value;

  const dati = {
    titolo,
    cat:  document.getElementById('ad-cat').value,
    data: document.getElementById('ad-data').value || null,
    note: document.getElementById('ad-note').value.trim(),
    scad: document.getElementById('ad-scad').value || null
  };

  if(id){
    // Modalità modifica: aggiorna l'intervento esistente
    const idx = archivio.findIndex(x => x.id === id);
    if(idx !== -1) archivio[idx] = { ...archivio[idx], ...dati };
    showToast('Intervento aggiornato');
  } else {
    // Modalità nuovo: aggiunge all'array
    archivio.push({ id: Date.now().toString(), ...dati });
    showToast('Intervento salvato');
  }

  saveArch(archivio);
  renderArch();
  checkScadenze();
  closeArchDialog();
}

// Elimina un intervento dato il suo ID, dopo conferma dell'utente.
function eliminaArch(id){
  if(!confirm('Eliminare questo intervento?')) return;
  archivio = archivio.filter(x => x.id !== id);
  saveArch(archivio); renderArch(); checkScadenze();
}

// Restituisce un riassunto testuale dell'archivio per il system prompt di Claude.
// L'AI usa questi dati per fare suggerimenti contestuali sulle manutenzioni.
function attContext(){
  if(!archivio.length) return 'Nessun intervento registrato in archivio.';

  const oggi = new Date(); oggi.setHours(0,0,0,0);

  // Costruisce una descrizione completa di ogni intervento
  // includendo titolo, categoria, data, NOTE e scadenza.
  // Le note sono fondamentali: contengono istruzioni su come fare le cose.
  const descrizioni = [...archivio]
    .sort((a,b) => { const da=a.data?new Date(a.data):new Date(0); const db=b.data?new Date(b.data):new Date(0); return db-da; })
    .map(e => {
      let riga = `- [${e.cat.toUpperCase()}] ${e.titolo}` + (e.data ? ` (ultima esecuzione: ${e.data})` : ` (data esecuzione: sconosciuta)`);
      if(e.note) riga += ` | Note: ${e.note}`;
      if(e.scad){
        const giorni = Math.ceil((new Date(e.scad+'T00:00:00') - oggi) / 86400000);
        if(giorni < 0)       riga += ` | SCADUTO da ${Math.abs(giorni)} giorni`;
        else if(giorni === 0) riga += ` | SCADE OGGI`;
        else if(giorni <= 7)  riga += ` | scade tra ${giorni} giorni`;
        else                  riga += ` | prossima scadenza: ${e.scad}`;
      }
      return riga;
    });

  return '\n' + descrizioni.join('\n');
}

// 8. AI — Comunicazione con Claude API
//
// Usa le Anthropic Messages API.
// Ogni chiamata include:
//   - system: contesto (meteo, data, archivio)
//   - messages: storico conversazione (max 20 messaggi)
//
// PER CAMBIARE MODELLO: modifica 'claude-sonnet-4-5' in callClaude()
// PER CAMBIARE MAX TOKEN: modifica i valori 150 (voce) e 600 (chat)
// ══════════════════════════════════════════════

// Costruisce il system prompt inviato a Claude ad ogni chiamata.
// Contiene data, stagione, meteo attuale e stato archivio.
// breve=true → chiede risposte corte per la modalità vocale
function buildSystem(breve=false){
  const n    = new Date();
  const stag = ['Inverno','Inverno','Primavera','Primavera','Primavera',
                'Estate','Estate','Estate','Autunno','Autunno','Autunno','Inverno'];

  const archCtx = attContext();

  return `Sei "Casa", assistente domestico intelligente per Leo a ${CITY}.
Data: ${n.toLocaleString('it-IT')} — Stagione: ${stag[n.getMonth()]}
Meteo attuale: ${weatherSummary()}

ARCHIVIO MANUTENZIONE DOMESTICA:
${archCtx}

ISTRUZIONI IMPORTANTI:
- Usa SEMPRE le informazioni dell'archivio quando rispondi a domande sulla casa
- Le "Note" di ogni intervento contengono istruzioni specifiche su come fare le cose: citale e usale
- Se un intervento ha una scadenza imminente o superata, segnalalo proattivamente
- Quando Leo chiede "come si fa" qualcosa, controlla prima se c'è una nota nell'archivio
- Suggerisci attività in base al meteo e alla stagione
- Tono diretto, amichevole, pratico${breve ? '\n- Rispondi in MASSIMO 2 frasi brevi (risposta vocale)' : ''}`;
}

// Funzione base per chiamare l'API Claude.
// Riceve un array di messaggi e restituisce il testo della risposta.
// breve=true → usa max_tokens=150 per risposte più corte (modalità vocale)
async function callClaude(messages, breve=false){
  const res = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'x-api-key': apiKey,
      'anthropic-version': '2023-06-01',
      // Questo header è richiesto per chiamare l'API direttamente dal browser
      'anthropic-dangerous-direct-browser-access': 'true'
    },
    body: JSON.stringify({
      model: 'claude-sonnet-4-5',   // ← cambia qui per usare un altro modello
      max_tokens: breve ? 150 : 600, // ← 150 per voce, 600 per chat scritta
      system: buildSystem(breve),
      messages
    })
  });
  const d = await res.json();
  if(d.error) throw new Error(d.error.message);
  return d.content[0].text; // restituisce solo il testo della risposta
}

// Invia un messaggio testuale (dalla chat scritta).
// Aggiunge al chatHistory e mostra la risposta nella chat.
async function askAI(text){
  chatHistory.push({ role:'user', content:text });
  setTyping(true);
  try{
    const reply = await callClaude(chatHistory, false);
    setTyping(false);
    addMsg(reply, 'ai');
    chatHistory.push({ role:'assistant', content:reply });
    // Mantieni lo storico a max 20 messaggi (10 scambi) per non eccedere il context window
    if(chatHistory.length > 20) chatHistory = chatHistory.slice(-16);
  }catch(e){
    setTyping(false);
    addMsg(e.message.includes('401') ? '[ API key non valida ]' : `[ Errore: ${e.message} ]`, 'ai');
  }
}

// Aggiunge un messaggio alla chat UI.
// who = 'user' (bolla bianca destra) | 'ai' (bolla scura sinistra)
function addMsg(text, who){
  const area   = document.getElementById('chat-area');
  const typing = document.getElementById('typing');
  const d      = document.createElement('div');
  d.className  = `msg ${who}`;
  if(who === 'ai') d.innerHTML = `<div class="lbl">Casa ·</div>${fmt(text)}`;
  else d.textContent = text;
  area.insertBefore(d, typing); // inserisce prima dell'animazione typing
  area.scrollTop = area.scrollHeight; // scrolla in fondo
}

// Converte markdown base in HTML (grassetto, corsivo, a capo)
function fmt(t){
  return t
    .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>') // **testo** → grassetto
    .replace(/\*(.*?)\*/g,     '<em>$1</em>')          // *testo* → corsivo
    .replace(/\n/g,            '<br>');                // newline → a capo HTML
}

// Mostra/nasconde l'animazione "sta scrivendo..." (tre puntini animati)
function setTyping(on){
  document.getElementById('typing').className = on ? 'typing on' : 'typing';
  if(on) document.getElementById('chat-area').scrollTop = 999999;
}

// Invia il messaggio digitato nel campo input della chat
async function sendMessage(){
  const el = document.getElementById('cp-input');
  const t  = el.value.trim();
  if(!t) return;
  addMsg(t, 'user');
  el.value = '';
  autoResize(el); // riporta il textarea all'altezza minima
  await askAI(t);
}

// Apre la chat e invia una domanda predefinita (bottoni navbar Oggi/Meteo)
async function quickAsk(t){
  openPanel('chat-panel');
  addMsg(t, 'user');
  await askAI(t);
}

// Gestisce invio con tasto Enter (senza Shift+Enter che fa a capo)
function handleKey(e){
  if(e.key === 'Enter' && !e.shiftKey){ e.preventDefault(); sendMessage(); }
}

// Ridimensiona automaticamente il textarea in base al contenuto (max 100px)
function autoResize(el){
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 100) + 'px';
}


// ══════════════════════════════════════════════
// 9. WAKE WORD — Rilevamento vocale "Claude"
//
// FLUSSO COMPLETO:
//   1. startWakeWord() → avvia il loop di ascolto
//   2. listenLoop()    → ascolta continuamente (ciclo)
//   3. Sente "claude"  → listenForCommand() o handleCommand()
//   4. Utente parla    → handleCommand(testo)
//   5. Risposta Claude → speakText() → torna a listenLoop()
//
// VARIANTI RICONOSCIUTE come wake word:
//   "claude", "claud", "clod", "klaud", "klod", "cloud"
//   (per gestire accenti e pronunce diverse)
//
// STATI UI:
//   idle         → microfono spento (icona 🎤)
//   wake-active  → in attesa wake word (anello rotante)
//   listening    → ascolta il comando (icona ■)
//   thinking     → chiamata API in corso (icona …)
//   speaking     → TTS in riproduzione (icona ◎)
// ══════════════════════════════════════════════

// Aggiorna l'UI del microfono in base allo stato corrente.
// Modifica classe CSS del wrapper, icona del bottone, testo label.
function setState(s){
  currentState = s;
  const wrap = document.getElementById('mic-wrap');
  const btn  = document.getElementById('mic-btn');
  const lbl  = document.getElementById('mic-lbl');

  // Rimuovi tutte le classi stato precedenti
  wrap.className = 'mic-ring-wrap';

  // Mappa stato → [classe CSS, simbolo bottone, testo label]
  const states = {
    'wake-active': ['state-wake-active', '◉', 'in ascolto...'],
    'listening':   ['state-listening',   '■', 'parla ora'],
    'thinking':    ['state-thinking',    '…', 'sto pensando...'],
    'speaking':    ['state-speaking',    '◎', 'sto parlando...'],
  };

  if(states[s]){
    wrap.classList.add(states[s][0]);
    btn.dataset.state = states[s][1]; // usa dataset invece di textContent per non sovrascrivere SVG
    lbl.textContent   = states[s][2];
  } else {
    // idle: nessuna classe, nessun testo
    btn.dataset.state = 'idle';
    lbl.textContent   = '';
  }
}

// Toggle manuale: toccare il bottone microfono
// - Se sta parlando: interrompe e riprende ascolto
// - Se wake è attivo: disattiva
// - Se idle: attiva
function toggleWake(){
  if(currentState === 'speaking'){
    window.speechSynthesis.cancel();
    isSpeaking = false;
    startWakeWord();
    return;
  }
  if(wakeEnabled){ stopWakeWord(); return; }
  startWakeWord();
}

// Avvia il sistema wake word: controlla supporto, imposta stato, lancia il loop
function startWakeWord(){
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if(!SR){ showToast('Microfono non supportato'); return; }
  wakeEnabled = true;
  setState('wake-active');
  listenLoop();
  // Avvia anche il monitoraggio del volume ambientale
  startAmbientMonitor();
}

// Ferma completamente il wake word: disabilita flag, ferma recognition, torna idle
function stopWakeWord(){
  wakeEnabled = false;
  if(wakeRecognition){ try{ wakeRecognition.stop(); }catch(e){} wakeRecognition = null; }
  setState('idle');
  stopAmbientMonitor();
}

// ══════════════════════════════════════════════
// WAKE WORD ENGINE — una sola istanza continua
//
// Usa continuous:true così il microfono resta
// sempre aperto senza accendi/spegni continui.
//
// STATI INTERNI:
//   waitingWake    → in ascolto per "Claude"
//   waitingCommand → wake word rilevata, attende comando
//   processing     → chiamata API in corso
// ══════════════════════════════════════════════

let listenState = 'waitingWake'; // stato interno del loop

function listenLoop(){
  if(!wakeEnabled) return;

  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if(!SR){ showToast('Microfono non supportato'); return; }

  wakeRecognition = new SR();
  wakeRecognition.lang           = 'it-IT';
  wakeRecognition.continuous     = true;   // SEMPRE APERTO — niente accendi/spegni
  wakeRecognition.interimResults = false;
  wakeRecognition.maxAlternatives = 3;

  listenState = 'waitingWake';

  wakeRecognition.onresult = (e) => {
    // Prendi solo i risultati nuovi (dall'ultimo indice processato)
    for(let i = e.resultIndex; i < e.results.length; i++){
      if(!e.results[i].isFinal) continue;

      const text = e.results[i][0].transcript.toLowerCase().trim();

      if(listenState === 'waitingWake'){
        // Cerca wake word
        if(/claud|clod|klaud|klod|cloud/.test(text)){
          // Estrai eventuale comando inline (es. "Claude che tempo fa")
          const cmd = text.replace(/claud\w*|clod\w*|klaud\w*|klod\w*|cloud\w*/gi,'').trim();
          if(cmd.length > 3){
            // Comando già incluso nella stessa frase
            listenState = 'processing';
            beep();
            handleCommand(cmd);
          } else {
            // Solo wake word → aspetta il comando nella frase successiva
            listenState = 'waitingCommand';
            setState('listening');
            beep();
          }
        }

      } else if(listenState === 'waitingCommand'){
        // Ricevuto il comando
        if(text.length > 1){
          listenState = 'processing';
          handleCommand(text);
        }
      }
      // Se listenState === 'processing' ignora input fino al termine
    }
  };

  wakeRecognition.onerror = (e) => {
    if(!wakeEnabled) return;
    if(e.error === 'no-speech'){
      // Nessun parlato rilevato: se stava aspettando comando, torna a wake
      if(listenState === 'waitingCommand'){
        listenState = 'waitingWake';
        setState('wake-active');
      }
      // non riavviare — continuous:true riparte da solo
    } else if(e.error === 'aborted'){
      // Riavvia solo se non stiamo elaborando
      if(wakeEnabled && listenState !== 'processing'){
        setTimeout(listenLoop, 300);
      }
    } else {
      // Errore grave → riavvia dopo pausa
      console.warn('SpeechRecognition error:', e.error);
      if(wakeEnabled) setTimeout(listenLoop, 2000);
    }
  };

  wakeRecognition.onend = () => {
    // continuous:true non dovrebbe mai finire da solo —
    // ma se succede (es. timeout browser) riavvia
    if(wakeEnabled && listenState !== 'processing'){
      setTimeout(listenLoop, 500);
    }
  };

  try{
    wakeRecognition.start();
    setState('wake-active');
  }catch(e){
    if(wakeEnabled) setTimeout(listenLoop, 1000);
  }
}

// Ferma il recognition quando torna disponibile dopo handleCommand
function resumeListening(){
  if(!wakeEnabled) return;
  listenState = 'waitingWake';
  setState('wake-active');
  // Se il recognition è ancora vivo, continua — altrimenti riavvia
  if(!wakeRecognition){
    listenLoop();
    return;
  }
  try{
    // Tenta di riusare l'istanza esistente (evita riavvio microfono)
    // Se non è più attiva, l'eccezione ci porta al catch
    wakeRecognition.onresult; // verifica che esista
  }catch(e){
    listenLoop();
  }
}

// listenForCommand non serve più con continuous:true
// mantenuta come stub per retrocompatibilità
function listenForCommand(){
  listenState = 'waitingCommand';
  setState('listening');
  beep();
}

async function handleCommand(cmd){
  setState('thinking');
  addMsg(cmd, 'user');
  const msgs = [...chatHistory, {role:'user', content:cmd}];
  try{
    const reply = await callClaude(msgs, true);
    chatHistory.push({role:'user', content:cmd});
    chatHistory.push({role:'assistant', content:reply});
    if(chatHistory.length > 20) chatHistory = chatHistory.slice(-16);
    addMsg(reply, 'ai');
    // Parla, poi riprende l'ascolto
    speakText(reply, () => { resumeListening(); });
  }catch(err){
    const msg = err.message.includes('401') ? 'Chiave API non valida' : 'Errore di connessione';
    addMsg(`[ ${msg} ]`, 'ai');
    resumeListening();
  }
}


// ══════════════════════════════════════════════
// CHIME
// ══════════════════════════════════════════════
function chime(){
  return new Promise(resolve => {
    try{
      const ctx = new (window.AudioContext || window.webkitAudioContext)();
      const now = ctx.currentTime;
      function nota(freq, start, dur){
        const o = ctx.createOscillator(), g = ctx.createGain();
        o.connect(g); g.connect(ctx.destination);
        o.type = 'sine'; o.frequency.value = freq;
        g.gain.setValueAtTime(0, start);
        g.gain.linearRampToValueAtTime(0.15, start+0.05);
        g.gain.exponentialRampToValueAtTime(0.001, start+dur);
        o.start(start); o.stop(start+dur);
      }
      nota(261.6, now,       0.7);
      nota(329.6, now+0.15,  0.6);
      nota(392.0, now+0.28,  0.5);
      setTimeout(resolve, 700);
    }catch(e){ resolve(); }
  });
}

// ══════════════════════════════════════════════
// TTS — ElevenLabs o browser TTS
// ══════════════════════════════════════════════
async function speakText(text, onEnd=null){
  const clean = text
    .replace(/\*\*(.*?)\*\*/g,'$1')
    .replace(/\*(.*?)\*/g,'$1')
    .replace(/#+\s/g,'')
    .replace(/<[^>]+>/g,'');

  await chime();

  if(elKey && elVoice){
    setState('speaking'); isSpeaking=true;
    try{
      const res = await fetch('https://api.elevenlabs.io/v1/text-to-speech/'+elVoice, {
        method:'POST',
        headers:{'xi-api-key':elKey,'Content-Type':'application/json','Accept':'audio/mpeg'},
        body:JSON.stringify({
          text:clean, model_id:'eleven_multilingual_v2',
          voice_settings:{stability:0.5,similarity_boost:0.8,style:0.3,use_speaker_boost:true}
        })
      });
      if(!res.ok) throw new Error('EL '+res.status);
      const url = URL.createObjectURL(await res.blob());
      const audio = new Audio(url);
      audio.onended = () => { isSpeaking=false; URL.revokeObjectURL(url); setState(wakeEnabled?'wake-active':'idle'); if(onEnd)onEnd(); };
      audio.onerror = () => { isSpeaking=false; setState(wakeEnabled?'wake-active':'idle'); if(onEnd)onEnd(); };
      audio.play(); return;
    }catch(e){ console.warn('ElevenLabs fallback:',e); }
  }

  if(!window.speechSynthesis){ setState('idle'); if(onEnd)onEnd(); return; }
  window.speechSynthesis.cancel();
  const utt = new SpeechSynthesisUtterance(clean);
  utt.lang='it-IT'; utt.rate=1.0; utt.pitch=1.0;
  const doSpeak=()=>{
    const v=window.speechSynthesis.getVoices();
    const iv=v.find(x=>x.lang==='it-IT')||v.find(x=>x.lang.startsWith('it'));
    if(iv)utt.voice=iv;
    utt.onstart=()=>{ isSpeaking=true; setState('speaking'); };
    utt.onend  =()=>{ isSpeaking=false; setState(wakeEnabled?'wake-active':'idle'); if(onEnd)onEnd(); };
    utt.onerror=()=>{ isSpeaking=false; setState(wakeEnabled?'wake-active':'idle'); if(onEnd)onEnd(); };
    window.speechSynthesis.speak(utt);
  };
  window.speechSynthesis.getVoices().length>0 ? doSpeak() : (window.speechSynthesis.onvoiceschanged=doSpeak);
}

if(window.speechSynthesis){
  window.speechSynthesis.getVoices();
  window.speechSynthesis.onvoiceschanged=()=>window.speechSynthesis.getVoices();
}

function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),3000);
}

function toggleFullscreen(){
  const el=document.documentElement;
  if(!document.fullscreenElement){
    (el.requestFullscreen||el.webkitRequestFullscreen||el.mozRequestFullScreen||el.msRequestFullscreen).call(el);
  }else{
    (document.exitFullscreen||document.webkitExitFullscreen||document.mozCancelFullScreen||document.msExitFullscreen).call(document);
  }
}
document.addEventListener('fullscreenchange',()=>{
  const ic=document.getElementById('fs-icon');
  if(ic)ic.innerHTML=document.fullscreenElement
    ?'<path d="M8 3v3a2 2 0 0 1-2 2H3"/><path d="M21 8h-3a2 2 0 0 1-2-2V3"/><path d="M3 16h3a2 2 0 0 1 2 2v3"/><path d="M16 21v-3a2 2 0 0 1 2-2h3"/>'
    :'<path d="M8 3H5a2 2 0 0 0-2 2v3"/><path d="M21 8V5a2 2 0 0 0-2-2h-3"/><path d="M3 16v3a2 2 0 0 0 2 2h3"/><path d="M16 21h3a2 2 0 0 0 2-2v-3"/>';
});
