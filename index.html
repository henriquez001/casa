<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>CASA</title>
<link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@300;400;700&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

:root {
  --bg: #000;
  --b1: #111;
  --b2: #222;
  --b3: #444;
  --mid: #888;
  --text: #fff;
  --mono: 'Roboto Mono', monospace;
}

body {
  font-family: var(--mono);
  background: #000;
  color: #fff;
  width: 100vw;
  height: 100dvh;
  overflow: hidden;
}

/* ══════════════════════════
   SETUP
══════════════════════════ */
#setup {
  position: fixed; inset: 0;
  background: #000;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  padding: 32px; gap: 32px;
  z-index: 200;
  border-top: 3px solid #fff;
}
#setup.hidden { display: none; }

.s-wordmark {
  font-size: 2.4rem;
  font-weight: 700;
  letter-spacing: -.02em;
  text-align: center;
}
.s-wordmark small {
  display: block;
  font-size: .6rem;
  font-weight: 300;
  color: var(--b3);
  letter-spacing: .3em;
  text-transform: uppercase;
  margin-top: 8px;
}

.s-box {
  width: 100%; max-width: 360px;
  border: 1px solid var(--b2);
  padding: 24px;
}
.s-lbl {
  font-size: .6rem; font-weight: 300;
  color: var(--b3); letter-spacing: .2em;
  text-transform: uppercase;
  display: block; margin-bottom: 8px;
}
.s-inp {
  width: 100%;
  background: #000; border: 1px solid var(--b2);
  padding: 13px 12px; color: #fff;
  font-family: var(--mono); font-size: .8rem; font-weight: 300;
  outline: none; margin-bottom: 16px;
  transition: border-color .15s;
}
.s-inp:focus { border-color: #fff; }
.s-inp::placeholder { color: var(--b3); }
.s-btn {
  width: 100%; background: #fff; color: #000;
  border: none; padding: 14px;
  font-family: var(--mono); font-size: .72rem;
  font-weight: 700; letter-spacing: .16em;
  text-transform: uppercase; cursor: pointer;
}
.s-btn:active { opacity: .8; }
.s-note {
  font-size: .62rem; font-weight: 300;
  color: var(--b3); text-align: center; line-height: 2;
}
.s-note a { color: var(--mid); }

/* ══════════════════════════
   HOME — LANDSCAPE
   orologio al centro assoluto
   meteo angolo top-left
   toolbar bottom
══════════════════════════ */
#home {
  position: fixed; inset: 0;
  display: none;
}

/* sfondo palette rotante */
#home::before {
  content: '';
  position: absolute; top: 50%; left: 50%;
  transform: translate(-50%,-50%);
  width: 150vmax; height: 150vmax;
  background: conic-gradient(
    from 0deg,
    #ff2d5505 0deg, #ff6b0005 60deg, #ffd60a05 120deg,
    #30d15805 180deg, #0a84ff05 240deg, #bf5af205 300deg,
    #ff2d5505 360deg
  );
  border-radius: 50%;
  animation: spin 90s linear infinite;
  pointer-events: none;
}
@keyframes spin { to { transform: translate(-50%,-50%) rotate(360deg); } }

/* ── OROLOGIO — centro assoluto ── */
.clock-center {
  position: absolute;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  display: flex; flex-direction: column;
  align-items: center; gap: 4px;
  z-index: 2;
}

.clock-hm {
  font-size: clamp(5rem, 18vw, 12rem);
  font-weight: 700;
  line-height: 1;
  letter-spacing: -.04em;
  color: #fff;
  transition: text-shadow 3s ease;
  user-select: none;
}

.colon { animation: blink 1s step-start infinite; }
@keyframes blink { 50% { opacity: .08; } }

.clock-sub {
  display: flex; align-items: center;
  gap: 16px;
  font-size: .7rem; font-weight: 300;
  color: var(--b3); letter-spacing: .14em;
  text-transform: uppercase;
}

.clock-ss { color: var(--b2); }

/* ── METEO — angolo top-left ── */
.weather-corner {
  position: absolute;
  top: 0; left: 0;
  padding: 16px 20px;
  z-index: 3;
  border-right: 1px solid var(--b1);
  border-bottom: 1px solid var(--b1);
  min-width: 160px;
  background: rgba(0,0,0,.6);
  backdrop-filter: blur(8px);
}

.wc-top {
  display: flex; align-items: baseline; gap: 10px;
  margin-bottom: 6px;
}

.wc-icon { font-size: 1.3rem; line-height: 1; }

.wc-temp {
  font-size: 1.8rem; font-weight: 700; line-height: 1;
  color: #fff;
}

.wc-accent {
  width: 100%; height: 1px;
  background: var(--wc, #333);
  margin-bottom: 6px;
  transition: background 2s;
}

.wc-desc {
  font-size: .55rem; font-weight: 300;
  color: var(--mid); letter-spacing: .12em;
  text-transform: uppercase;
  margin-bottom: 4px;
}

.wc-stats {
  font-size: .52rem; font-weight: 300;
  color: var(--b3); letter-spacing: .08em;
  line-height: 1.9;
}

.wc-loc {
  font-size: .48rem; font-weight: 300;
  color: var(--b2); letter-spacing: .1em;
  text-transform: uppercase;
  margin-top: 4px;
  border-top: 1px solid var(--b1);
  padding-top: 5px;
}

/* ── BADGE SCADENZE — top-right ── */
.due-corner {
  position: absolute;
  top: 0; right: 0;
  z-index: 3;
}
.due-badge {
  display: block;
  background: #ff2d55; color: #fff;
  font-size: .52rem; font-weight: 700;
  letter-spacing: .1em; text-transform: uppercase;
  padding: 6px 12px; cursor: pointer;
  animation: fadeUp .3s ease;
}
@keyframes fadeUp { from{opacity:0;transform:translateY(-4px)} to{opacity:1;transform:translateY(0)} }

/* ── MICROFONO — centro-basso ── */
.mic-center {
  position: absolute;
  bottom: 52px; left: 50%;
  transform: translateX(-50%);
  display: flex; flex-direction: column;
  align-items: center; gap: 8px;
  z-index: 3;
}

.mic-ring-wrap {
  position: relative;
  width: 64px; height: 64px;
}

.mic-btn {
  position: absolute; inset: 0;
  border-radius: 50%;
  border: 1px solid var(--b2);
  background: transparent;
  color: var(--b3);
  font-size: 1.5rem;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: all .25s;
  z-index: 1;
}

/* anello esterno rotante quando in ascolto wake */
.mic-ring {
  position: absolute; inset: -5px;
  border-radius: 50%;
  border: 1px solid transparent;
  pointer-events: none;
}

.state-wake-active .mic-btn  { border-color: var(--b3); color: var(--b3); }
.state-wake-active .mic-ring { border-color: var(--b2); animation: ringrot 3s linear infinite; }

.state-listening .mic-btn { border-color: #fff; background: #fff; color: #000; animation: pp .7s infinite; }

.state-thinking .mic-btn { border-color: var(--mid); color: var(--mid); }

.state-speaking .mic-btn { border-color: #30d158; color: #30d158; animation: glow 1s infinite; }
.state-speaking .mic-ring { border-color: #30d15830; animation: ringrot 1.5s linear infinite; }

@keyframes ringrot { to { transform: rotate(360deg); } }
@keyframes pp { 0%,100%{transform:scale(1)} 50%{transform:scale(1.1)} }
@keyframes glow { 0%,100%{box-shadow:0 0 0 0 #30d15820} 50%{box-shadow:0 0 0 10px #30d15800} }

.mic-lbl {
  font-size: .54rem; font-weight: 300;
  color: var(--b3); letter-spacing: .16em;
  text-transform: uppercase;
  min-height: 12px; text-align: center;
}

.mic-hint {
  font-size: .48rem; font-weight: 300;
  color: var(--b2); letter-spacing: .12em;
  text-transform: uppercase;
}

/* ── TOOLBAR — bottom ── */
.toolbar {
  position: absolute;
  bottom: 0; left: 0; right: 0;
  display: flex;
  border-top: 1px solid var(--b1);
  z-index: 3;
  background: rgba(0,0,0,.8);
  backdrop-filter: blur(8px);
}

.tb-btn {
  flex: 1; background: transparent; border: none;
  border-right: 1px solid var(--b1);
  padding: 11px 4px;
  font-family: var(--mono); font-size: .54rem;
  font-weight: 300; color: var(--b3);
  letter-spacing: .12em; text-transform: uppercase;
  cursor: pointer; transition: all .15s;
}
.tb-btn:last-child { border-right: none; }
.tb-btn:active { background: #fff; color: #000; }

/* ══════════════════════════
   PANELS — slide up
══════════════════════════ */
.panel {
  position: fixed; inset: 0;
  background: #000; z-index: 50;
  display: flex; flex-direction: column;
  transform: translateY(100%);
  transition: transform .28s cubic-bezier(.4,0,.2,1);
}
.panel.open { transform: translateY(0); }

.panel-hdr {
  display: flex; align-items: center; justify-content: space-between;
  padding: 14px 20px;
  border-bottom: 1px solid var(--b1);
  flex-shrink: 0;
}
.panel-title {
  font-size: .7rem; font-weight: 700;
  letter-spacing: .16em; text-transform: uppercase;
}
.panel-close {
  font-family: var(--mono); font-size: .58rem; font-weight: 300;
  color: var(--b3); background: transparent;
  border: 1px solid var(--b2);
  padding: 6px 12px; cursor: pointer;
  letter-spacing: .1em; text-transform: uppercase;
}
.panel-close:active { background: #fff; color: #000; }

/* chat */
.chat-area {
  flex: 1; padding: 14px 18px;
  overflow-y: auto;
  display: flex; flex-direction: column; gap: 10px;
}
.msg {
  max-width: 86%; padding: 10px 14px;
  font-size: .84rem; font-weight: 300; line-height: 1.7;
  animation: fadeUp .2s ease;
}
.msg.ai {
  background: #080808;
  border: 1px solid var(--b1);
  border-left: 2px solid #fff;
  align-self: flex-start;
}
.msg.ai .lbl {
  font-size: .54rem; font-weight: 300;
  color: var(--b3); letter-spacing: .16em;
  text-transform: uppercase; margin-bottom: 6px;
}
.msg.user {
  background: #fff; color: #000;
  align-self: flex-end; font-weight: 400;
}
.typing {
  display: none; align-items: center; gap: 5px;
  padding: 10px 14px;
  background: #080808;
  border: 1px solid var(--b1); border-left: 2px solid var(--b2);
  width: fit-content;
}
.typing.on { display: flex; }
.dot {
  width: 4px; height: 4px;
  background: var(--b3); border-radius: 50%;
  animation: db 1.2s infinite;
}
.dot:nth-child(2){animation-delay:.2s} .dot:nth-child(3){animation-delay:.4s}
@keyframes db { 0%,60%,100%{transform:translateY(0);opacity:.3} 30%{transform:translateY(-5px);opacity:1} }

.cp-row {
  display: flex; gap: 8px;
  padding: 12px 16px 20px;
  border-top: 1px solid var(--b1);
  flex-shrink: 0;
}
.cp-inp {
  flex: 1; background: #080808;
  border: 1px solid var(--b2);
  padding: 11px 13px; color: #fff;
  font-family: var(--mono); font-size: .84rem; font-weight: 300;
  outline: none; resize: none;
  min-height: 43px; max-height: 100px; line-height: 1.5;
  transition: border-color .15s;
}
.cp-inp:focus { border-color: #fff; }
.cp-inp::placeholder { color: var(--b3); font-size: .76rem; }
.cp-send {
  width: 43px; height: 43px;
  background: #fff; color: #000; border: none;
  cursor: pointer; font-size: 1rem;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}

/* attività */
.att-list {
  flex: 1; overflow-y: auto; padding: 14px 16px;
}
.att-empty {
  text-align: center; color: var(--b3);
  font-size: .66rem; font-weight: 300;
  letter-spacing: .12em; text-transform: uppercase;
  margin-top: 48px; line-height: 2.4;
}
.att-item {
  border: 1px solid var(--b1);
  padding: 12px 14px; margin-bottom: 8px;
  display: flex; align-items: center; gap: 12px;
  position: relative; overflow: hidden;
}
.att-item::before {
  content: ''; position: absolute;
  left: 0; top: 0; bottom: 0; width: 2px;
  background: var(--ic, var(--b2));
}
.att-info { flex: 1; padding-left: 4px; }
.att-name { font-weight: 400; font-size: .86rem; margin-bottom: 3px; }
.att-meta {
  font-size: .56rem; font-weight: 300;
  color: var(--mid); letter-spacing: .06em; line-height: 1.8;
}
.att-due { font-size: .6rem; font-weight: 700; margin-top: 3px; }
.att-due.ok { color: #30d158; }
.att-due.soon { color: #ffd60a; }
.att-due.overdue { color: #ff2d55; }
.att-actions { display: flex; flex-direction: column; gap: 5px; }
.att-btn {
  font-family: var(--mono); font-size: .52rem; font-weight: 300;
  letter-spacing: .08em; text-transform: uppercase;
  background: transparent; border: 1px solid var(--b2);
  color: var(--mid); padding: 5px 8px; cursor: pointer;
  white-space: nowrap;
}
.att-btn:active { background: #fff; color: #000; }
.att-add-bar {
  padding: 12px 16px 20px;
  border-top: 1px solid var(--b1);
  display: flex; gap: 8px; flex-shrink: 0;
}
.att-add-inp {
  flex: 1; background: #080808;
  border: 1px solid var(--b2);
  padding: 11px 13px; color: #fff;
  font-family: var(--mono); font-size: .82rem; font-weight: 300;
  outline: none; transition: border-color .15s;
}
.att-add-inp:focus { border-color: #fff; }
.att-add-inp::placeholder { color: var(--b3); font-size: .76rem; }
.att-add-btn {
  background: #fff; color: #000; border: none;
  padding: 0 16px;
  font-family: var(--mono); font-size: .72rem; font-weight: 700;
  letter-spacing: .1em; cursor: pointer;
}

/* dialog */
#dialog {
  position: fixed; inset: 0;
  background: rgba(0,0,0,.92);
  z-index: 80; display: none; align-items: flex-end;
}
#dialog.open { display: flex; }
.dlg-box {
  width: 100%; background: #000;
  border-top: 2px solid #fff;
  padding: 22px 20px 30px;
}
.dlg-title {
  font-size: .72rem; font-weight: 700;
  letter-spacing: .16em; text-transform: uppercase;
  margin-bottom: 16px;
}
.dlg-field { display: flex; flex-direction: column; gap: 6px; margin-bottom: 12px; }
.dlg-lbl {
  font-size: .58rem; font-weight: 300;
  color: var(--b3); letter-spacing: .14em; text-transform: uppercase;
}
.dlg-inp {
  background: #000; border: 1px solid var(--b2);
  padding: 10px 12px; color: #fff;
  font-family: var(--mono); font-size: .78rem; font-weight: 300;
  outline: none; width: 100%; transition: border-color .15s;
}
.dlg-inp:focus { border-color: #fff; }
.dlg-sel {
  background: #000; border: 1px solid var(--b2);
  padding: 10px 12px; color: #fff;
  font-family: var(--mono); font-size: .78rem; font-weight: 300;
  outline: none; width: 100%; appearance: none;
}
.dlg-row { display: flex; gap: 8px; margin-top: 6px; }
.dlg-btn {
  flex: 1; padding: 13px;
  font-family: var(--mono); font-size: .68rem;
  font-weight: 700; letter-spacing: .12em;
  text-transform: uppercase; cursor: pointer; border: none;
}
.dlg-btn.cancel { background: transparent; border: 1px solid var(--b2); color: var(--mid); }
.dlg-btn.confirm { background: #fff; color: #000; }

/* toast */
.toast {
  position: fixed; bottom: 52px; left: 50%;
  transform: translateX(-50%) translateY(10px);
  background: #fff; color: #000;
  padding: 8px 16px;
  font-family: var(--mono); font-size: .62rem;
  font-weight: 700; letter-spacing: .08em;
  opacity: 0; transition: all .2s; z-index: 300;
  white-space: nowrap;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<!-- SETUP -->
<div id="setup">
  <div class="s-wordmark">CASA<small>assistente domestico</small></div>
  <div class="s-box">
    <label class="s-lbl">API Key Claude</label>
    <input class="s-inp" type="password" id="api-input" placeholder="sk-ant-api03-..." autocomplete="off">
    <button class="s-btn" onclick="saveAndStart()">Attiva →</button>
  </div>
  <p class="s-note">Ottieni la chiave su<br><a href="https://console.anthropic.com" target="_blank">console.anthropic.com</a></p>
</div>

<!-- HOME -->
<div id="home">

  <!-- orologio al centro -->
  <div class="clock-center">
    <div class="clock-hm" id="clk-hm">00<span class="colon">:</span>00</div>
    <div class="clock-sub">
      <span class="clock-ss" id="clk-ss">00s</span>
      <span id="clk-date"></span>
    </div>
  </div>

  <!-- meteo angolo top-left -->
  <div class="weather-corner" id="weather-corner">
    <div class="wc-top">
      <span class="wc-icon" id="wc-icon">—</span>
      <span class="wc-temp" id="wc-temp">—°</span>
    </div>
    <div class="wc-accent" id="wc-accent"></div>
    <div class="wc-desc" id="wc-desc">Caricamento...</div>
    <div class="wc-stats" id="wc-stats"></div>
    <div class="wc-loc">Cervare · MC</div>
  </div>

  <!-- badge scadenze top-right -->
  <div class="due-corner" id="due-corner"></div>

  <!-- mic al centro-basso -->
  <div class="mic-center" id="mic-center">
    <div class="mic-ring-wrap" id="mic-wrap">
      <div class="mic-ring" id="mic-ring"></div>
      <button class="mic-btn" id="mic-btn" onclick="toggleWake()">🎤</button>
    </div>
    <div class="mic-lbl" id="mic-lbl"></div>
    <div class="mic-hint">di' "Claude" per iniziare</div>
  </div>

  <!-- toolbar bottom -->
  <div class="toolbar">
    <button class="tb-btn" onclick="openPanel('chat-panel')">Chat</button>
    <button class="tb-btn" onclick="openPanel('att-panel')">Attività</button>
    <button class="tb-btn" onclick="quickAsk('Cosa devo fare oggi?')">Oggi</button>
    <button class="tb-btn" onclick="quickAsk('Meteo nei prossimi giorni')">Meteo</button>
    <button class="tb-btn" onclick="resetApp()">Cfg</button>
  </div>
</div>

<!-- CHAT PANEL -->
<div class="panel" id="chat-panel">
  <div class="panel-hdr">
    <div class="panel-title">CASA / Chat</div>
    <button class="panel-close" onclick="closePanel('chat-panel')">✕ Chiudi</button>
  </div>
  <div class="chat-area" id="chat-area">
    <div class="typing" id="typing">
      <div class="dot"></div><div class="dot"></div><div class="dot"></div>
    </div>
  </div>
  <div class="cp-row">
    <textarea class="cp-inp" id="cp-input" placeholder="Scrivi..." rows="1"
      onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
    <button class="cp-send" onclick="sendMessage()">↑</button>
  </div>
</div>

<!-- ATTIVITÀ PANEL -->
<div class="panel" id="att-panel">
  <div class="panel-hdr">
    <div class="panel-title">CASA / Attività</div>
    <button class="panel-close" onclick="closePanel('att-panel')">✕ Chiudi</button>
  </div>
  <div class="att-list" id="att-list"></div>
  <div class="att-add-bar">
    <input class="att-add-inp" id="att-input"
      placeholder="Nuova attività..."
      onkeydown="if(event.key==='Enter')addAttFromInput()">
    <button class="att-add-btn" onclick="addAttFromInput()">+</button>
  </div>
</div>

<!-- DIALOG -->
<div id="dialog">
  <div class="dlg-box">
    <div class="dlg-title">Nuova Attività</div>
    <div class="dlg-field">
      <label class="dlg-lbl">Nome</label>
      <input class="dlg-inp" id="d-nome" placeholder="es. Pulizia filtri caldaia">
    </div>
    <div class="dlg-field">
      <label class="dlg-lbl">Frequenza</label>
      <select class="dlg-sel" id="d-freq">
        <option value="7">Settimanale</option>
        <option value="14">Ogni 2 settimane</option>
        <option value="30" selected>Mensile</option>
        <option value="60">Ogni 2 mesi</option>
        <option value="90">Trimestrale</option>
        <option value="180">Semestrale</option>
        <option value="365">Annuale</option>
      </select>
    </div>
    <div class="dlg-field">
      <label class="dlg-lbl">Ultima esecuzione</label>
      <input class="dlg-inp" type="date" id="d-ultima">
    </div>
    <div class="dlg-field">
      <label class="dlg-lbl">Note (opzionale)</label>
      <input class="dlg-inp" id="d-note" placeholder="es. Usare prodotto X">
    </div>
    <div class="dlg-row">
      <button class="dlg-btn cancel" onclick="closeDialog()">Annulla</button>
      <button class="dlg-btn confirm" onclick="salvaAtt()">Salva →</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ══════════════════════════════
// STORAGE
// ══════════════════════════════
const SKEY = 'casa_att_v2';
function loadAtt(){ try{ return JSON.parse(localStorage.getItem(SKEY)||'[]'); }catch{return[];} }
function saveAtt(l){ localStorage.setItem(SKEY, JSON.stringify(l)); }
let attivita = loadAtt();

// ══════════════════════════════
// GLOBALS
// ══════════════════════════════
const LAT=43.2832, LON=13.4534, CITY='Contrada Cervare, Macerata';
let apiKey='', chatHistory=[], weatherData=null;
let isSpeaking=false;
let wakeEnabled=false, wakeRecognition=null;
let currentState='idle'; // idle | wake-active | listening | thinking | speaking

const PAL=['#5e5ce6','#5e5ce6','#5e5ce6','#5e5ce6','#5e5ce6',
           '#ffd60a','#ffd60a','#ff6b00','#30d158','#30d158','#30d158',
           '#0a84ff','#0a84ff','#0a84ff','#0a84ff','#ff6b00','#ff6b00',
           '#ff2d55','#ff2d55','#ff2d55','#bf5af2','#bf5af2','#bf5af2','#5e5ce6'];

// ══════════════════════════════
// SETUP
// ══════════════════════════════
function saveAndStart(){
  const k = document.getElementById('api-input').value.trim();
  if(!k.startsWith('sk-ant-')){ showToast('CHIAVE NON VALIDA'); return; }
  apiKey = k;
  localStorage.setItem('casa_key', k);
  boot();
}

function boot(){
  document.getElementById('setup').classList.add('hidden');
  document.getElementById('home').style.display = 'block';
  startClock();
  loadWeather();
  renderAtt();
  checkScadenze();
  // Avvia wake word dopo 800ms per dare tempo al browser
  setTimeout(startWakeWord, 800);
}

function resetApp(){
  if(confirm('Cambiare configurazione?')){
    localStorage.removeItem('casa_key');
    location.reload();
  }
}

window.onload = () => {
  const k = localStorage.getItem('casa_key');
  if(k){ apiKey=k; boot(); }
  document.getElementById('d-ultima').value = new Date().toISOString().split('T')[0];
};

// ══════════════════════════════
// PANELS
// ══════════════════════════════
function openPanel(id){ document.getElementById(id).classList.add('open'); }
function closePanel(id){ document.getElementById(id).classList.remove('open'); }

// ══════════════════════════════
// CLOCK
// ══════════════════════════════
const GG=['Dom','Lun','Mar','Mer','Gio','Ven','Sab'];
const MM=['Gen','Feb','Mar','Apr','Mag','Giu','Lug','Ago','Set','Ott','Nov','Dic'];

function startClock(){ tick(); setInterval(tick, 1000); }

function tick(){
  const n = new Date();
  const hh = String(n.getHours()).padStart(2,'0');
  const mm = String(n.getMinutes()).padStart(2,'0');
  const ss = String(n.getSeconds()).padStart(2,'0');
  document.getElementById('clk-hm').innerHTML = `${hh}<span class="colon">:</span>${mm}`;
  document.getElementById('clk-ss').textContent = ss+'s';
  document.getElementById('clk-date').textContent = `${GG[n.getDay()]} ${n.getDate()} ${MM[n.getMonth()]}`;
  const col = PAL[n.getHours()];
  document.getElementById('clk-hm').style.textShadow = `0 0 100px ${col}40`;
}

// ══════════════════════════════
// WEATHER
// ══════════════════════════════
function wCol(c){ if(c<=1)return'#ffd60a'; if(c<=3)return'#666'; if(c<=48)return'#555'; if(c<=82)return'#0a84ff'; return'#ff453a'; }
function wIcon(c){ if(c===0)return'☀'; if(c<=2)return'⛅'; if(c<=3)return'☁'; if(c<=48)return'≋'; if(c<=67)return'⟁'; if(c<=77)return'❄'; if(c<=82)return'⟁'; return'↯'; }
function wDesc(c){ const m={0:'Sereno',1:'Prev. sereno',2:'Parz. nuvoloso',3:'Nuvoloso',45:'Nebbia',51:'Pioggerella',61:'Pioggia leggera',63:'Pioggia',65:'Pioggia intensa',71:'Neve leggera',73:'Neve',80:'Rovesci',95:'Temporale'}; return m[c]||'Variabile'; }

async function loadWeather(){
  try{
    const r = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${LAT}&longitude=${LON}&current=temperature_2m,relative_humidity_2m,weather_code,wind_speed_10m&daily=temperature_2m_max,temperature_2m_min,precipitation_sum&timezone=Europe%2FRome&forecast_days=3`);
    const d = await r.json();
    if(!d.current) throw new Error('no data');
    weatherData = d;
    const c=d.current, dy=d.daily, col=wCol(c.weather_code);
    document.getElementById('wc-accent').style.background = col;
    document.getElementById('wc-accent').style.setProperty('--wc', col);
    document.getElementById('wc-icon').textContent = wIcon(c.weather_code);
    document.getElementById('wc-temp').textContent = `${Math.round(c.temperature_2m)}°`;
    document.getElementById('wc-desc').textContent = wDesc(c.weather_code).toUpperCase();
    document.getElementById('wc-stats').innerHTML =
      `💧 ${c.relative_humidity_2m}%  🌬 ${Math.round(c.wind_speed_10m)} km/h\n↑${Math.round(dy.temperature_2m_max[0])}°  ↓${Math.round(dy.temperature_2m_min[0])}°`.replace('\n','<br>');
    setTimeout(loadWeather, 30*60*1000);
  }catch(e){
    document.getElementById('wc-desc').textContent = 'N/D';
  }
}

function weatherSummary(){
  if(!weatherData) return 'Meteo non disponibile.';
  const c=weatherData.current, d=weatherData.daily;
  return `${wDesc(c.weather_code)}, ${Math.round(c.temperature_2m)}°C (max ${Math.round(d.temperature_2m_max[0])}°, min ${Math.round(d.temperature_2m_min[0])}°). Domani max ${Math.round(d.temperature_2m_max[1])}°.`;
}

// ══════════════════════════════
// ATTIVITÀ
// ══════════════════════════════
function giorniA(a){
  if(!a.ultimaVolta) return 0;
  const p = new Date(a.ultimaVolta).getTime() + a.freq*86400000;
  return Math.ceil((p - Date.now())/86400000);
}
function scadLbl(g){ if(g<0)return{t:`Scaduta ${Math.abs(g)}gg fa`,c:'overdue'}; if(g===0)return{t:'Da fare oggi',c:'overdue'}; if(g<=7)return{t:`Tra ${g} giorni`,c:'soon'}; return{t:`Tra ${g} giorni`,c:'ok'}; }
function attCol(g){ if(g<0)return'#ff2d55'; if(g<=7)return'#ffd60a'; return'#30d158'; }
function freqLbl(g){ const m={7:'Settimanale',14:'Ogni 2 sett.',30:'Mensile',60:'Ogni 2 mesi',90:'Trimestrale',180:'Semestrale',365:'Annuale'}; return m[g]||`Ogni ${g}gg`; }

function renderAtt(){
  const el = document.getElementById('att-list');
  if(!attivita.length){ el.innerHTML='<div class="att-empty">Nessuna attività.<br>Aggiungine una qui sotto.</div>'; return; }
  const sorted = [...attivita].sort((a,b)=>giorniA(a)-giorniA(b));
  el.innerHTML = sorted.map(a=>{
    const g=giorniA(a), lbl=scadLbl(g), col=attCol(g);
    const ul = a.ultimaVolta ? new Date(a.ultimaVolta).toLocaleDateString('it-IT') : 'Mai';
    return `<div class="att-item" style="--ic:${col}">
      <div class="att-info">
        <div class="att-name">${a.nome}</div>
        <div class="att-meta">${freqLbl(a.freq)} · Ultima: ${ul}${a.note?'<br>'+a.note:''}</div>
        <div class="att-due ${lbl.c}">${lbl.t}</div>
      </div>
      <div class="att-actions">
        <button class="att-btn" onclick="segnaFatta('${a.id}')">✓ Fatta</button>
        <button class="att-btn" onclick="elimina('${a.id}')">✕</button>
      </div>
    </div>`;
  }).join('');
}

function checkScadenze(){
  const tot = attivita.filter(a=>giorniA(a)<=7).length;
  const el = document.getElementById('due-corner');
  el.innerHTML = tot>0
    ? `<div class="due-badge" onclick="openPanel('att-panel')">${tot} IN SCADENZA</div>`
    : '';
}

function addAttFromInput(){
  const inp = document.getElementById('att-input');
  const nome = inp.value.trim(); if(!nome) return;
  inp.value=''; openDialog(nome);
}

function openDialog(nome=''){
  document.getElementById('d-nome').value = nome;
  document.getElementById('d-note').value = '';
  document.getElementById('d-ultima').value = new Date().toISOString().split('T')[0];
  document.getElementById('d-freq').value = '30';
  document.getElementById('dialog').classList.add('open');
}
function closeDialog(){ document.getElementById('dialog').classList.remove('open'); }

function salvaAtt(){
  const nome = document.getElementById('d-nome').value.trim();
  if(!nome){ showToast('INSERISCI UN NOME'); return; }
  attivita.push({
    id: Date.now().toString(), nome,
    freq: parseInt(document.getElementById('d-freq').value),
    ultimaVolta: document.getElementById('d-ultima').value||null,
    note: document.getElementById('d-note').value.trim()
  });
  saveAtt(attivita); renderAtt(); checkScadenze(); closeDialog();
  showToast('ATTIVITÀ SALVATA');
}

function segnaFatta(id){
  const a = attivita.find(x=>x.id===id); if(!a) return;
  a.ultimaVolta = new Date().toISOString().split('T')[0];
  saveAtt(attivita); renderAtt(); checkScadenze();
  showToast('✓ ' + a.nome.toUpperCase());
}

function elimina(id){
  const a = attivita.find(x=>x.id===id); if(!a) return;
  if(!confirm(`Eliminare "${a.nome}"?`)) return;
  attivita = attivita.filter(x=>x.id!==id);
  saveAtt(attivita); renderAtt(); checkScadenze();
}

function attContext(){
  if(!attivita.length) return 'Nessuna attività registrata.';
  const sc = attivita.filter(a=>giorniA(a)<=0).map(a=>a.nome);
  const im = attivita.filter(a=>{const g=giorniA(a);return g>0&&g<=7;}).map(a=>`${a.nome} (${giorniA(a)}gg)`);
  const pr = attivita.filter(a=>giorniA(a)>7).map(a=>`${a.nome} (${giorniA(a)}gg)`);
  let s='';
  if(sc.length) s+=`SCADUTE: ${sc.join(', ')}. `;
  if(im.length) s+=`IMMINENTI: ${im.join(', ')}. `;
  if(pr.length) s+=`Prossime: ${pr.join(', ')}.`;
  return s||'Tutto in regola.';
}

// ══════════════════════════════
// AI — unica funzione fetch
// ══════════════════════════════
function buildSystem(breve=false){
  const n=new Date();
  const stag=['Inverno','Inverno','Primavera','Primavera','Primavera','Estate','Estate','Estate','Autunno','Autunno','Autunno','Inverno'];
  return `Sei "Casa", assistente domestico per Leo a ${CITY}.
Data: ${n.toLocaleString('it-IT')} — ${stag[n.getMonth()]}
Meteo: ${weatherSummary()}
Attività: ${attContext()}
Rispondi in italiano, tono diretto.${breve?' MAX 2 frasi brevi (risposta vocale).':''}`;
}

async function callClaude(messages, breve=false){
  const res = await fetch('https://api.anthropic.com/v1/messages',{
    method:'POST',
    headers:{
      'Content-Type':'application/json',
      'x-api-key': apiKey,
      'anthropic-version':'2023-06-01',
      'anthropic-dangerous-direct-browser-access':'true'
    },
    body: JSON.stringify({
      model:'claude-sonnet-4-5',
      max_tokens: breve ? 150 : 600,
      system: buildSystem(breve),
      messages
    })
  });
  const d = await res.json();
  if(d.error) throw new Error(d.error.message);
  return d.content[0].text;
}

// ── Chat testuale ──
async function askAI(text){
  chatHistory.push({role:'user', content:text});
  setTyping(true);
  try{
    const reply = await callClaude(chatHistory, false);
    setTyping(false);
    addMsg(reply,'ai');
    chatHistory.push({role:'assistant', content:reply});
    if(chatHistory.length>20) chatHistory=chatHistory.slice(-16);
  }catch(e){
    setTyping(false);
    addMsg(e.message.includes('401')?'[ API KEY NON VALIDA ]':`[ ERRORE: ${e.message} ]`,'ai');
  }
}

function addMsg(text,who){
  const area=document.getElementById('chat-area'), typing=document.getElementById('typing');
  const d=document.createElement('div'); d.className=`msg ${who}`;
  if(who==='ai') d.innerHTML=`<div class="lbl">CASA /</div>${fmt(text)}`;
  else d.textContent=text;
  area.insertBefore(d,typing); area.scrollTop=area.scrollHeight;
}
function fmt(t){ return t.replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>').replace(/\*(.*?)\*/g,'<em>$1</em>').replace(/\n/g,'<br>'); }
function setTyping(on){ document.getElementById('typing').className=on?'typing on':'typing'; if(on)document.getElementById('chat-area').scrollTop=999999; }

async function sendMessage(){
  const el=document.getElementById('cp-input'), t=el.value.trim(); if(!t) return;
  addMsg(t,'user'); el.value=''; autoResize(el); await askAI(t);
}
async function quickAsk(t){ openPanel('chat-panel'); addMsg(t,'user'); await askAI(t); }
function handleKey(e){ if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMessage();} }
function autoResize(el){ el.style.height='auto'; el.style.height=Math.min(el.scrollHeight,100)+'px'; }

// ══════════════════════════════
// WAKE WORD + VOCE
// ══════════════════════════════
function setState(s){
  currentState=s;
  const wrap=document.getElementById('mic-wrap');
  const btn=document.getElementById('mic-btn');
  const lbl=document.getElementById('mic-lbl');
  // rimuovi tutte le classi stato
  wrap.className='mic-ring-wrap';
  if(s==='wake-active'){ wrap.classList.add('state-wake-active'); btn.textContent='◉'; lbl.textContent='in ascolto...'; }
  else if(s==='listening'){ wrap.classList.add('state-listening'); btn.textContent='■'; lbl.textContent='parla ora'; }
  else if(s==='thinking'){ wrap.classList.add('state-thinking'); btn.textContent='…'; lbl.textContent='sto pensando...'; }
  else if(s==='speaking'){ wrap.classList.add('state-speaking'); btn.textContent='◎'; lbl.textContent='sto parlando...'; }
  else { btn.textContent='🎤'; lbl.textContent=''; }
}

function toggleWake(){
  if(currentState==='speaking'){ window.speechSynthesis.cancel(); isSpeaking=false; startWakeWord(); return; }
  if(wakeEnabled){ stopWakeWord(); return; }
  startWakeWord();
}

function startWakeWord(){
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SR){ showToast('MICROFONO NON SUPPORTATO'); return; }
  wakeEnabled=true;
  setState('wake-active');
  listenLoop();
}

function stopWakeWord(){
  wakeEnabled=false;
  if(wakeRecognition){ try{wakeRecognition.stop();}catch(e){} wakeRecognition=null; }
  setState('idle');
}

function listenLoop(){
  if(!wakeEnabled) return;
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  wakeRecognition=new SR();
  wakeRecognition.lang='it-IT';
  wakeRecognition.continuous=false;
  wakeRecognition.interimResults=false;
  wakeRecognition.maxAlternatives=5;

  wakeRecognition.onresult=(e)=>{
    let text='', detected=false;
    for(let i=0;i<e.results.length;i++){
      for(let j=0;j<e.results[i].length;j++){
        const t=e.results[i][j].transcript.toLowerCase().trim();
        text+=t+' ';
        if(/claud|clod|klaud|klod|cloud/.test(t)) detected=true;
      }
    }
    if(detected){
      // estrai comando dopo wake word
      const cmd=text.replace(/claud\w*|clod\w*|klaud\w*|klod\w*|cloud\w*/gi,'').trim();
      if(cmd.length>3){ handleCommand(cmd); }
      else { listenForCommand(); }
    } else {
      if(wakeEnabled) setTimeout(listenLoop, 200);
    }
  };

  wakeRecognition.onerror=(e)=>{
    const retry = (e.error==='no-speech'||e.error==='aborted') ? 300 : 1500;
    if(wakeEnabled) setTimeout(listenLoop, retry);
  };

  wakeRecognition.onend=()=>{
    if(wakeEnabled && currentState==='wake-active') setTimeout(listenLoop, 200);
  };

  try{ wakeRecognition.start(); }
  catch(e){ if(wakeEnabled) setTimeout(listenLoop, 1000); }
}

function listenForCommand(){
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  const r=new SR();
  r.lang='it-IT'; r.continuous=false; r.interimResults=false;
  setState('listening');
  beep();

  r.onresult=(e)=>{ handleCommand(e.results[0][0].transcript); };
  r.onerror=()=>{ setState('wake-active'); if(wakeEnabled) setTimeout(listenLoop,300); };
  r.onend=()=>{ if(currentState==='listening'){ setState('wake-active'); if(wakeEnabled) setTimeout(listenLoop,300); } };
  try{ r.start(); }catch(e){ setState('wake-active'); if(wakeEnabled) setTimeout(listenLoop,500); }
}

async function handleCommand(cmd){
  setState('thinking');
  addMsg(cmd,'user');

  // Usa una copia separata per non sporcare chatHistory
  const msgs=[...chatHistory, {role:'user',content:cmd}];

  try{
    const reply = await callClaude(msgs, true);
    // aggiorna chatHistory solo se va bene
    chatHistory.push({role:'user',content:cmd});
    chatHistory.push({role:'assistant',content:reply});
    if(chatHistory.length>20) chatHistory=chatHistory.slice(-16);

    addMsg(reply,'ai');
    speakText(reply, ()=>{
      if(wakeEnabled) setTimeout(listenLoop, 400);
    });
  }catch(err){
    const msg = err.message.includes('401') ? 'Chiave API non valida' : 'Errore di connessione, riprova';
    addMsg('[ '+msg.toUpperCase()+' ]','ai');
    setState(wakeEnabled?'wake-active':'idle');
    if(wakeEnabled) setTimeout(listenLoop,1500);
  }
}

function speakText(text, onEnd=null){
  if(!window.speechSynthesis){ setState('idle'); if(onEnd)onEnd(); return; }
  window.speechSynthesis.cancel();
  const clean=text.replace(/\*\*(.*?)\*\*/g,'$1').replace(/\*(.*?)\*/g,'$1').replace(/#+\s/g,'').replace(/<[^>]+>/g,'');
  const utt=new SpeechSynthesisUtterance(clean);
  utt.lang='it-IT'; utt.rate=1.0; utt.pitch=1.0;

  // Attende che le voci siano caricate
  const doSpeak=()=>{
    const voices=window.speechSynthesis.getVoices();
    const itVoice=voices.find(v=>v.lang==='it-IT')||voices.find(v=>v.lang.startsWith('it'));
    if(itVoice) utt.voice=itVoice;
    utt.onstart=()=>{ isSpeaking=true; setState('speaking'); };
    utt.onend=()=>{ isSpeaking=false; setState(wakeEnabled?'wake-active':'idle'); if(onEnd)onEnd(); };
    utt.onerror=()=>{ isSpeaking=false; setState(wakeEnabled?'wake-active':'idle'); if(onEnd)onEnd(); };
    window.speechSynthesis.speak(utt);
  };

  const voices=window.speechSynthesis.getVoices();
  if(voices.length>0){ doSpeak(); }
  else { window.speechSynthesis.onvoiceschanged=()=>{ doSpeak(); }; }
}

function beep(){
  try{
    const ctx=new(window.AudioContext||window.webkitAudioContext)();
    const o=ctx.createOscillator(), g=ctx.createGain();
    o.connect(g); g.connect(ctx.destination);
    o.frequency.value=900; o.type='sine';
    g.gain.setValueAtTime(.12,ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(.001,ctx.currentTime+.12);
    o.start(); o.stop(ctx.currentTime+.12);
  }catch(e){}
}

// precarica voci
if(window.speechSynthesis){
  window.speechSynthesis.getVoices();
  window.speechSynthesis.onvoiceschanged=()=>window.speechSynthesis.getVoices();
}

// ══════════════════════════════
// TOAST
// ══════════════════════════════
function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),3000);
}
