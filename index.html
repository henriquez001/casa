<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>CASA</title>
<link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@300;400;700&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

:root {
  --bg: #0a0a0a;
  --b1: #161616;
  --b2: #242424;
  --b3: #3a3a3a;
  --mid: #777;
  --mono: 'Roboto Mono', monospace;
}

html, body {
  font-family: var(--mono);
  background: var(--bg);
  color: #fff;
  width: 100vw;
  height: 100dvh;
  overflow: hidden;
  user-select: none;
}

/* ══════════════════════════
   SETUP
══════════════════════════ */
#setup {
  position: fixed; inset: 0;
  background: var(--bg);
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  padding: 32px; gap: 28px;
  z-index: 200;
}
#setup.hidden { display: none; }

.s-logo {
  font-size: 2rem; font-weight: 700;
  letter-spacing: .12em; text-align: center;
  color: #fff;
}
.s-logo small {
  display: block; font-size: .58rem;
  font-weight: 300; color: var(--mid);
  letter-spacing: .28em; text-transform: uppercase;
  margin-top: 6px;
}

.s-box {
  width: 100%; max-width: 340px;
  background: var(--b1);
  border: 1px solid var(--b2);
  border-radius: 12px;
  padding: 24px;
}
.s-lbl {
  font-size: .58rem; font-weight: 300;
  color: var(--mid); letter-spacing: .18em;
  text-transform: uppercase;
  display: block; margin-bottom: 8px;
}
.s-inp {
  width: 100%; background: var(--bg);
  border: 1px solid var(--b3);
  border-radius: 8px;
  padding: 13px 12px; color: #fff;
  font-family: var(--mono); font-size: .8rem; font-weight: 300;
  outline: none; margin-bottom: 16px;
  transition: border-color .15s;
}
.s-inp:focus { border-color: #fff; }
.s-inp::placeholder { color: var(--b3); }
.s-btn {
  width: 100%; background: #fff; color: #000;
  border: none; border-radius: 8px; padding: 13px;
  font-family: var(--mono); font-size: .72rem;
  font-weight: 700; letter-spacing: .14em;
  text-transform: uppercase; cursor: pointer;
}
.s-note {
  font-size: .6rem; font-weight: 300;
  color: var(--b3); text-align: center; line-height: 2;
}
.s-note a { color: var(--mid); }

/* ══════════════════════════
   HOME
══════════════════════════ */
#home {
  position: fixed; inset: 0;
  display: none;
  flex-direction: column;
}

/* ── BARRA METEO TOP — scorrimento orizzontale ── */
.weather-bar {
  flex-shrink: 0;
  height: 36px;
  background: var(--b1);
  border-bottom: 1px solid var(--b2);
  overflow: hidden;
  position: relative;
}

.weather-scroll {
  display: flex;
  align-items: center;
  height: 100%;
  white-space: nowrap;
  animation: scroll-left 32s linear infinite;
  will-change: transform;
}

.weather-scroll:hover { animation-play-state: paused; }

@keyframes scroll-left {
  from { transform: translateX(0); }
  to   { transform: translateX(-50%); }
}

.w-item {
  display: inline-flex;
  align-items: center;
  gap: 7px;
  margin-right: 48px;
  font-size: .7rem; font-weight: 300;
  color: #bbb;
  letter-spacing: .04em;
}

.w-item .w-loc  { font-weight: 500; color: #fff; }
.w-item .w-temp { color: #fff; }
.w-item .w-desc { color: var(--mid); }
.w-item .w-icon { font-size: .9rem; }

/* separatore */
.w-sep {
  display: inline-block;
  width: 1px; height: 14px;
  background: var(--b3);
  margin-right: 48px;
  vertical-align: middle;
}

/* ── CORPO CENTRALE — orologio ── */
.clock-body {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  position: relative;
  gap: 0;
}

/* glow palette */
.clock-body::before {
  content: '';
  position: absolute; top: 50%; left: 50%;
  transform: translate(-50%,-50%);
  width: 120vmax; height: 120vmax;
  background: conic-gradient(
    from 0deg,
    #ff2d5504 0deg, #ff6b0004 60deg, #ffd60a04 120deg,
    #30d15804 180deg, #0a84ff04 240deg, #bf5af204 300deg,
    #ff2d5504 360deg
  );
  border-radius: 50%;
  animation: spin 90s linear infinite;
  pointer-events: none;
}
@keyframes spin { to { transform: translate(-50%,-50%) rotate(360deg); } }

/* OROLOGIO — HH:MM:SS grandi come reference */
.clock-digits {
  display: flex;
  align-items: baseline;
  gap: 0;
  position: relative; z-index: 1;
}

.clock-hms {
  font-size: clamp(4rem, 22vw, 10rem);
  font-weight: 700;
  line-height: 1;
  letter-spacing: -.03em;
  color: #fff;
  transition: text-shadow 3s ease;
}

.clock-sep {
  font-size: clamp(3rem, 16vw, 7.5rem);
  font-weight: 300;
  color: var(--b3);
  line-height: 1;
  letter-spacing: 0;
  animation: blink 1s step-start infinite;
  padding: 0 2px;
}
@keyframes blink { 50% { opacity: .15; } }

/* DATA sotto l'orologio */
.clock-date {
  font-size: clamp(.72rem, 2.2vw, 1.1rem);
  font-weight: 300;
  color: var(--mid);
  letter-spacing: .06em;
  margin-top: 14px;
  position: relative; z-index: 1;
}

/* MIC — piccolo, sotto la data */
.mic-area {
  display: flex; flex-direction: column;
  align-items: center; gap: 6px;
  margin-top: 24px;
  position: relative; z-index: 1;
}

.mic-ring-wrap {
  position: relative; width: 52px; height: 52px;
}

.mic-ring {
  position: absolute; inset: -5px;
  border-radius: 50%;
  border: 1px solid transparent;
  pointer-events: none;
}

.mic-btn {
  position: absolute; inset: 0;
  border-radius: 50%;
  border: 1px solid var(--b3);
  background: transparent;
  color: var(--b3);
  font-size: 1.3rem;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: all .2s;
}

/* stati mic */
.state-wake-active .mic-btn  { border-color: var(--b3); color: var(--mid); }
.state-wake-active .mic-ring { border-color: var(--b2); animation: ringrot 4s linear infinite; }
.state-listening  .mic-btn   { border-color: #fff; background: #fff; color: #000; animation: pp .7s infinite; }
.state-thinking   .mic-btn   { border-color: var(--mid); color: var(--mid); }
.state-speaking   .mic-btn   { border-color: #30d158; color: #30d158; }
.state-speaking   .mic-ring  { border-color: #30d15840; animation: ringrot 1.2s linear infinite; }

@keyframes ringrot { to { transform: rotate(360deg); } }
@keyframes pp { 0%,100%{transform:scale(1)} 50%{transform:scale(1.1)} }

.mic-lbl {
  font-size: .52rem; font-weight: 300;
  color: var(--mid); letter-spacing: .18em;
  text-transform: uppercase; min-height: 11px;
  text-align: center;
}
.mic-hint {
  font-size: .48rem; font-weight: 300;
  color: var(--b3); letter-spacing: .14em;
  text-transform: uppercase;
}

/* badge scadenze */
.due-badge {
  position: absolute; top: 12px; right: 16px;
  background: #ff2d55; color: #fff;
  font-size: .5rem; font-weight: 700;
  letter-spacing: .1em; text-transform: uppercase;
  padding: 5px 10px; border-radius: 4px;
  cursor: pointer; z-index: 2;
  animation: fadeIn .3s ease;
}
@keyframes fadeIn { from{opacity:0} to{opacity:1} }

/* ── NAVBAR BOTTOM ── */
.navbar {
  flex-shrink: 0;
  height: 56px;
  background: var(--b1);
  border-top: 1px solid var(--b2);
  display: flex;
  align-items: stretch;
}

.nb-btn {
  flex: 1;
  background: transparent; border: none;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 3px;
  cursor: pointer; transition: all .15s;
  color: var(--mid);
}
.nb-btn:active { color: #fff; background: var(--b2); }

.nb-icon { width: 20px; height: 20px; color: inherit; }
.nb-lbl  { font-size: .44rem; font-weight: 300; letter-spacing: .14em; text-transform: uppercase; }

/* ══════════════════════════
   PANELS
══════════════════════════ */
.panel {
  position: fixed; inset: 0;
  background: var(--bg); z-index: 50;
  display: flex; flex-direction: column;
  transform: translateY(100%);
  transition: transform .28s cubic-bezier(.4,0,.2,1);
}
.panel.open { transform: translateY(0); }

.panel-hdr {
  display: flex; align-items: center; justify-content: space-between;
  padding: 14px 18px;
  border-bottom: 1px solid var(--b2);
  flex-shrink: 0;
}
.panel-title {
  font-size: .66rem; font-weight: 700;
  letter-spacing: .18em; text-transform: uppercase; color: #fff;
}
.panel-close {
  font-family: var(--mono); font-size: .58rem; font-weight: 300;
  color: var(--mid); background: transparent;
  border: 1px solid var(--b2); border-radius: 6px;
  padding: 6px 12px; cursor: pointer;
  letter-spacing: .1em; text-transform: uppercase;
}
.panel-close:active { background: #fff; color: #000; border-color: #fff; }

/* chat */
.chat-area {
  flex: 1; padding: 14px 16px;
  overflow-y: auto;
  display: flex; flex-direction: column; gap: 10px;
}
.msg {
  max-width: 86%; padding: 10px 13px;
  font-size: .82rem; font-weight: 300; line-height: 1.7;
  animation: fadeIn .2s ease;
  border-radius: 8px;
}
.msg.ai {
  background: var(--b1);
  border: 1px solid var(--b2);
  border-left: 2px solid #fff;
  align-self: flex-start;
  border-radius: 4px 10px 10px 4px;
}
.msg.ai .lbl {
  font-size: .52rem; font-weight: 300;
  color: var(--b3); letter-spacing: .16em;
  text-transform: uppercase; margin-bottom: 5px;
}
.msg.user {
  background: #fff; color: #000;
  align-self: flex-end; font-weight: 400;
  border-radius: 10px 4px 4px 10px;
}
.typing {
  display: none; align-items: center; gap: 5px;
  padding: 10px 14px;
  background: var(--b1); border: 1px solid var(--b2);
  border-left: 2px solid var(--b3);
  width: fit-content; border-radius: 4px 10px 10px 4px;
}
.typing.on { display: flex; }
.dot {
  width: 4px; height: 4px;
  background: var(--b3); border-radius: 50%;
  animation: db 1.2s infinite;
}
.dot:nth-child(2){animation-delay:.2s} .dot:nth-child(3){animation-delay:.4s}
@keyframes db { 0%,60%,100%{transform:translateY(0);opacity:.3} 30%{transform:translateY(-5px);opacity:1} }

.cp-row {
  display: flex; gap: 8px;
  padding: 10px 14px 20px;
  border-top: 1px solid var(--b2);
  flex-shrink: 0;
}
.cp-inp {
  flex: 1; background: var(--b1);
  border: 1px solid var(--b2); border-radius: 10px;
  padding: 11px 13px; color: #fff;
  font-family: var(--mono); font-size: .82rem; font-weight: 300;
  outline: none; resize: none;
  min-height: 42px; max-height: 100px; line-height: 1.5;
  transition: border-color .15s;
}
.cp-inp:focus { border-color: var(--b3); }
.cp-inp::placeholder { color: var(--b3); font-size: .76rem; }
.cp-send {
  width: 42px; height: 42px;
  background: #fff; color: #000; border: none;
  border-radius: 10px; cursor: pointer; font-size: 1rem;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}

/* attività */
.att-list { flex: 1; overflow-y: auto; padding: 12px 14px; }
.att-empty {
  text-align: center; color: var(--b3);
  font-size: .64rem; font-weight: 300;
  letter-spacing: .12em; text-transform: uppercase;
  margin-top: 48px; line-height: 2.4;
}
.att-item {
  background: var(--b1); border: 1px solid var(--b2);
  border-left: 3px solid var(--ic, var(--b3));
  border-radius: 4px 10px 10px 4px;
  padding: 12px 13px; margin-bottom: 8px;
  display: flex; align-items: center; gap: 12px;
}
.att-info { flex: 1; }
.att-name { font-weight: 500; font-size: .86rem; margin-bottom: 3px; }
.att-meta { font-size: .56rem; font-weight: 300; color: var(--mid); letter-spacing: .06em; line-height: 1.8; }
.att-due { font-size: .6rem; font-weight: 700; margin-top: 3px; }
.att-due.ok { color: #30d158; }
.att-due.soon { color: #ffd60a; }
.att-due.overdue { color: #ff2d55; }
.att-actions { display: flex; flex-direction: column; gap: 5px; }
.att-btn {
  font-family: var(--mono); font-size: .52rem; font-weight: 300;
  letter-spacing: .08em; text-transform: uppercase;
  background: transparent; border: 1px solid var(--b2);
  border-radius: 5px; color: var(--mid);
  padding: 5px 8px; cursor: pointer; white-space: nowrap;
}
.att-btn:active { background: #fff; color: #000; border-color: #fff; }
.att-add-bar {
  padding: 10px 14px 20px;
  border-top: 1px solid var(--b2);
  display: flex; gap: 8px; flex-shrink: 0;
}
.att-add-inp {
  flex: 1; background: var(--b1);
  border: 1px solid var(--b2); border-radius: 10px;
  padding: 11px 13px; color: #fff;
  font-family: var(--mono); font-size: .8rem; font-weight: 300;
  outline: none; transition: border-color .15s;
}
.att-add-inp:focus { border-color: var(--b3); }
.att-add-inp::placeholder { color: var(--b3); font-size: .76rem; }
.att-add-btn {
  background: #fff; color: #000; border: none;
  border-radius: 10px; padding: 0 18px;
  font-family: var(--mono); font-size: .72rem;
  font-weight: 700; letter-spacing: .1em; cursor: pointer;
}

/* ── ARCHIVIO ── */
.arch-toolbar {
  display: flex; gap: 8px;
  padding: 12px 14px 0;
  flex-shrink: 0;
}
.arch-search {
  flex: 1; background: var(--b1);
  border: 1px solid var(--b2); border-radius: 8px;
  padding: 9px 12px; color: #fff;
  font-family: var(--mono); font-size: .76rem; font-weight: 300;
  outline: none; transition: border-color .15s;
}
.arch-search:focus { border-color: var(--b3); }
.arch-search::placeholder { color: var(--b3); }
.arch-filter {
  background: var(--b1); border: 1px solid var(--b2);
  border-radius: 8px; padding: 0 10px;
  color: var(--mid); font-family: var(--mono);
  font-size: .65rem; font-weight: 300;
  letter-spacing: .08em; text-transform: uppercase;
  cursor: pointer; white-space: nowrap;
}
.arch-filter.active { background: #fff; color: #000; border-color: #fff; }

.arch-list { flex: 1; overflow-y: auto; padding: 12px 14px; }

.arch-empty {
  text-align: center; color: var(--b3);
  font-size: .64rem; font-weight: 300;
  letter-spacing: .12em; text-transform: uppercase;
  margin-top: 48px; line-height: 2.4;
}

.arch-entry {
  background: var(--b1); border: 1px solid var(--b2);
  border-left: 2px solid var(--ic, var(--b3));
  border-radius: 4px 10px 10px 4px;
  padding: 12px 13px; margin-bottom: 8px;
  cursor: pointer; transition: border-color .15s;
}
.arch-entry:active { border-color: var(--b3); }

.arch-entry-top {
  display: flex; align-items: flex-start;
  justify-content: space-between; gap: 10px;
}
.arch-entry-title { font-weight: 500; font-size: .88rem; }
.arch-entry-date {
  font-size: .56rem; font-weight: 300;
  color: var(--mid); letter-spacing: .06em;
  white-space: nowrap; margin-top: 2px;
}
.arch-entry-cat {
  display: inline-block;
  font-size: .5rem; font-weight: 700;
  letter-spacing: .12em; text-transform: uppercase;
  padding: 2px 7px; border-radius: 3px;
  background: var(--b2); color: var(--mid);
  margin-top: 6px;
}
.arch-entry-note {
  font-size: .72rem; font-weight: 300;
  color: var(--mid); line-height: 1.6;
  margin-top: 6px;
}
.arch-entry-del {
  font-family: var(--mono); font-size: .52rem; font-weight: 300;
  letter-spacing: .08em; text-transform: uppercase;
  background: transparent; border: 1px solid var(--b2);
  border-radius: 5px; color: var(--b3);
  padding: 4px 8px; cursor: pointer; margin-top: 8px;
}
.arch-entry-del:active { background: #ff2d55; color: #fff; border-color: #ff2d55; }

.arch-add-bar {
  padding: 10px 14px 20px;
  border-top: 1px solid var(--b2);
  display: flex; gap: 8px; flex-shrink: 0;
}
.arch-add-inp {
  flex: 1; background: var(--b1);
  border: 1px solid var(--b2); border-radius: 10px;
  padding: 11px 13px; color: #fff;
  font-family: var(--mono); font-size: .8rem; font-weight: 300;
  outline: none; transition: border-color .15s;
}
.arch-add-inp:focus { border-color: var(--b3); }
.arch-add-inp::placeholder { color: var(--b3); font-size: .76rem; }
.arch-add-btn {
  background: #fff; color: #000; border: none;
  border-radius: 10px; padding: 0 18px;
  font-family: var(--mono); font-size: .72rem;
  font-weight: 700; letter-spacing: .1em; cursor: pointer;
}

/* DIALOG ARCHIVIO */
#arch-dialog {
  position: fixed; inset: 0;
  background: rgba(0,0,0,.88);
  z-index: 80; display: none; align-items: flex-end;
}
#arch-dialog.open { display: flex; }
.adlg-box {
  width: 100%; background: var(--b1);
  border-top: 1px solid var(--b3);
  border-radius: 20px 20px 0 0;
  padding: 16px 18px 32px;
}
.adlg-handle {
  width: 36px; height: 4px;
  background: var(--b3); border-radius: 2px;
  margin: 0 auto 16px;
}
.adlg-title {
  font-size: .68rem; font-weight: 700;
  letter-spacing: .16em; text-transform: uppercase;
  margin-bottom: 14px;
}
.adlg-field { display: flex; flex-direction: column; gap: 5px; margin-bottom: 10px; }
.adlg-lbl { font-size: .56rem; font-weight: 300; color: var(--mid); letter-spacing: .14em; text-transform: uppercase; }
.adlg-inp {
  background: var(--bg); border: 1px solid var(--b2);
  border-radius: 8px; padding: 10px 12px; color: #fff;
  font-family: var(--mono); font-size: .78rem; font-weight: 300;
  outline: none; width: 100%; transition: border-color .15s;
}
.adlg-inp:focus { border-color: var(--b3); }
.adlg-textarea {
  background: var(--bg); border: 1px solid var(--b2);
  border-radius: 8px; padding: 10px 12px; color: #fff;
  font-family: var(--mono); font-size: .78rem; font-weight: 300;
  outline: none; width: 100%; resize: none; height: 80px;
  line-height: 1.5; transition: border-color .15s;
}
.adlg-textarea:focus { border-color: var(--b3); }
.adlg-sel {
  background: var(--bg); border: 1px solid var(--b2);
  border-radius: 8px; padding: 10px 12px; color: #fff;
  font-family: var(--mono); font-size: .78rem; font-weight: 300;
  outline: none; width: 100%; appearance: none;
}
.adlg-row { display: flex; gap: 8px; margin-top: 8px; }
.adlg-btn {
  flex: 1; padding: 13px; border-radius: 10px;
  font-family: var(--mono); font-size: .68rem;
  font-weight: 700; letter-spacing: .12em;
  text-transform: uppercase; cursor: pointer; border: none;
}
.adlg-btn.cancel { background: var(--b2); color: var(--mid); }
.adlg-btn.confirm { background: #fff; color: #000; }

/* dialog */

#dialog {
  position: fixed; inset: 0;
  background: rgba(0,0,0,.88);
  z-index: 80; display: none; align-items: flex-end;
}
#dialog.open { display: flex; }
.dlg-box {
  width: 100%; background: var(--b1);
  border-top: 1px solid var(--b3);
  border-radius: 20px 20px 0 0;
  padding: 20px 18px 32px;
}
.dlg-handle {
  width: 36px; height: 4px;
  background: var(--b3); border-radius: 2px;
  margin: 0 auto 18px;
}
.dlg-title {
  font-size: .68rem; font-weight: 700;
  letter-spacing: .16em; text-transform: uppercase;
  margin-bottom: 16px;
}
.dlg-field { display: flex; flex-direction: column; gap: 6px; margin-bottom: 12px; }
.dlg-lbl { font-size: .56rem; font-weight: 300; color: var(--mid); letter-spacing: .14em; text-transform: uppercase; }
.dlg-inp {
  background: var(--bg); border: 1px solid var(--b2);
  border-radius: 8px; padding: 10px 12px; color: #fff;
  font-family: var(--mono); font-size: .78rem; font-weight: 300;
  outline: none; width: 100%; transition: border-color .15s;
}
.dlg-inp:focus { border-color: var(--b3); }
.dlg-sel {
  background: var(--bg); border: 1px solid var(--b2);
  border-radius: 8px; padding: 10px 12px; color: #fff;
  font-family: var(--mono); font-size: .78rem; font-weight: 300;
  outline: none; width: 100%; appearance: none;
}
.dlg-row { display: flex; gap: 8px; margin-top: 8px; }
.dlg-btn {
  flex: 1; padding: 13px; border-radius: 10px;
  font-family: var(--mono); font-size: .68rem;
  font-weight: 700; letter-spacing: .12em;
  text-transform: uppercase; cursor: pointer; border: none;
}

<script>
// ══════════════════════════════
// STORAGE
// ══════════════════════════════
// legacy storage rimosso — ora si usa AKEY per archivio

// ══════════════════════════════
// GLOBALS
// ══════════════════════════════
const LAT=43.2832, LON=13.4534, CITY='Contrada Cervare, Macerata';
let apiKey='', chatHistory=[], weatherData=null;
let elKey='', elVoice='';
let isSpeaking=false;
let wakeEnabled=false, wakeRecognition=null;
let currentState='idle';

const PAL=['#5e5ce6','#5e5ce6','#5e5ce6','#5e5ce6','#5e5ce6',
           '#ffd60a','#ffd60a','#ff6b00','#30d158','#30d158','#30d158',
           '#0a84ff','#0a84ff','#0a84ff','#0a84ff','#ff6b00','#ff6b00',
           '#ff2d55','#ff2d55','#ff2d55','#bf5af2','#bf5af2','#bf5af2','#5e5ce6'];

// ══════════════════════════════
// SETUP
// ══════════════════════════════
function saveAndStart(){
  const k = document.getElementById('api-input').value.trim();
  if(!k.startsWith('sk-ant-')){ showToast('Chiave Claude non valida'); return; }
  apiKey = k; localStorage.setItem('casa_key', k);
  const elk = document.getElementById('el-key-input').value.trim();
  const elv = document.getElementById('el-voice-input').value.trim();
  if(elk) { elKey=elk; localStorage.setItem('el_key', elk); }
  if(elv) { elVoice=elv; localStorage.setItem('el_voice', elv); }
  boot();
}

function boot(){
  document.getElementById('setup').classList.add('hidden');
  document.getElementById('home').style.display = 'flex';
  startClock(); loadWeather(); renderArch(); checkScadenze();
  setTimeout(startWakeWord, 800);
}

function resetApp(){
  if(confirm('Cambiare configurazione?')){ localStorage.removeItem('casa_key'); location.reload(); }
}

window.onload = () => {
  const k = localStorage.getItem('casa_key');
  elKey   = localStorage.getItem('el_key')   || '';
  elVoice = localStorage.getItem('el_voice') || '';
  if(k){ apiKey=k; boot(); }
  // pre-fill setup fields
  if(elKey)   { const el=document.getElementById('el-key-input');   if(el) el.value=elKey; }
  if(elVoice) { const el=document.getElementById('el-voice-input'); if(el) el.value=elVoice; }
  document.getElementById('d-ultima').value = new Date().toISOString().split('T')[0];
};

// ══════════════════════════════
// PANELS
// ══════════════════════════════
function openPanel(id){ document.getElementById(id).classList.add('open'); }
function closePanel(id){ document.getElementById(id).classList.remove('open'); }

// ══════════════════════════════
// CLOCK
// ══════════════════════════════
const GIORNI=['Domenica','Lunedì','Martedì','Mercoledì','Giovedì','Venerdì','Sabato'];
const MESI=['Gennaio','Febbraio','Marzo','Aprile','Maggio','Giugno','Luglio','Agosto','Settembre','Ottobre','Novembre','Dicembre'];

function startClock(){ tick(); setInterval(tick, 1000); }

function tick(){
  const n = new Date();
  const hh = String(n.getHours()).padStart(2,'0');
  const mm = String(n.getMinutes()).padStart(2,'0');
  const ss = String(n.getSeconds()).padStart(2,'0');
  document.getElementById('clk-h').textContent = hh;
  document.getElementById('clk-m').textContent = mm;
  document.getElementById('clk-s').textContent = ss;
  document.getElementById('clk-date').textContent =
    `${GIORNI[n.getDay()]} ${n.getDate()} ${MESI[n.getMonth()]} ${n.getFullYear()}`;
  const col = PAL[n.getHours()];
  ['clk-h','clk-m','clk-s'].forEach(id=>{
    document.getElementById(id).style.textShadow = `0 0 80px ${col}35`;
  });
}

// ══════════════════════════════
// WEATHER
// ══════════════════════════════
function wIcon(c){
  const s=(d)=>`<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">${d}</svg>`;
  if(c===0) return s('<circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>');
  if(c<=2)  return s('<path d="M18 10h-1.26A8 8 0 1 0 9 20h9a5 5 0 0 0 0-10z"/><circle cx="12" cy="7" r="3"/>');
  if(c<=3)  return s('<path d="M18 10h-1.26A8 8 0 1 0 9 20h9a5 5 0 0 0 0-10z"/>');
  if(c<=48) return s('<line x1="1" y1="22" x2="23" y2="22"/><path d="M5 19H3a2 2 0 0 1 0-4h.09A6 6 0 0 1 15 9.09A5 5 0 0 1 21 14h-1"/><line x1="8" y1="22" x2="8" y2="19"/><line x1="12" y1="22" x2="12" y2="17"/><line x1="16" y1="22" x2="16" y2="19"/>');
  if(c<=67) return s('<line x1="16" y1="13" x2="16" y2="21"/><line x1="8" y1="13" x2="8" y2="21"/><line x1="12" y1="15" x2="12" y2="23"/><path d="M20 16.58A5 5 0 0 0 18 7h-1.26A8 8 0 1 0 4 15.25"/>');
  if(c<=77) return s('<polyline points="23 18 17 12 13 16 9 12 3 18"/><path d="M20 6.58A5 5 0 0 0 18 7h-1.26A8 8 0 1 0 4 15.25"/>');
  if(c<=82) return s('<line x1="16" y1="13" x2="16" y2="21"/><line x1="8" y1="13" x2="8" y2="21"/><line x1="12" y1="15" x2="12" y2="23"/><path d="M20 16.58A5 5 0 0 0 18 7h-1.26A8 8 0 1 0 4 15.25"/>');
  return s('<path d="M19 16.9A5 5 0 0 0 18 7h-1.26a8 8 0 1 0-11.62 9"/><polyline points="13 11 9 17 15 17 11 23"/>');
}
function wDesc(c){ const m={0:'Sereno',1:'Prev. sereno',2:'Parz. nuvoloso',3:'Nuvoloso',45:'Nebbia',51:'Pioggerella',61:'Pioggia leggera',63:'Pioggia',65:'Pioggia intensa',71:'Neve leggera',73:'Neve',80:'Rovesci',95:'Temporale'}; return m[c]||'Variabile'; }

function setWeatherBar(icon, temp, desc, extra){
  // set entrambe le copie per il loop
  ['','2'].forEach(s=>{
    document.getElementById('w-icon'+s).innerHTML = icon;
    document.getElementById('w-temp'+s).textContent = temp;
    document.getElementById('w-desc'+s).textContent = desc;
    document.getElementById('w-extra-txt'+s).textContent = extra;
  });
}

async function loadWeather(){
  try{
    const r = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${LAT}&longitude=${LON}&current=temperature_2m,relative_humidity_2m,weather_code,wind_speed_10m&daily=temperature_2m_max,temperature_2m_min,precipitation_sum&timezone=Europe%2FRome&forecast_days=3`);
    const d = await r.json();
    if(!d.current) throw new Error();
    weatherData = d;
    const c=d.current, dy=d.daily;
    const icon = wIcon(c.weather_code);
    const temp = `${Math.round(c.temperature_2m)}°`;
    const desc = wDesc(c.weather_code);
    const extra = `💧 ${c.relative_humidity_2m}%  🌬 ${Math.round(c.wind_speed_10m)} km/h  ↑${Math.round(dy.temperature_2m_max[0])}° ↓${Math.round(dy.temperature_2m_min[0])}°  ·  Domani ↑${Math.round(dy.temperature_2m_max[1])}° ↓${Math.round(dy.temperature_2m_min[1])}°`;
    setWeatherBar(icon, temp, desc, extra);
    setTimeout(loadWeather, 30*60*1000);
  }catch(e){
    setWeatherBar('—','—°','Non disponibile','');
  }
}

function weatherSummary(){
  if(!weatherData) return 'Meteo non disponibile.';
  const c=weatherData.current, d=weatherData.daily;
  return `${wDesc(c.weather_code)}, ${Math.round(c.temperature_2m)}°C. Max ${Math.round(d.temperature_2m_max[0])}°, min ${Math.round(d.temperature_2m_min[0])}°. Domani max ${Math.round(d.temperature_2m_max[1])}°.`;
}

// ══════════════════════════════
// ARCHIVIO MANUTENZIONE
// ══════════════════════════════
const AKEY = 'casa_archivio_v1';
function loadArch(){ try{ return JSON.parse(localStorage.getItem(AKEY)||'[]'); }catch{return[];} }
function saveArch(l){ localStorage.setItem(AKEY, JSON.stringify(l)); }
let archivio = loadArch();
let archFilter = 'all';

const CAT_COLORS = {
  manutenzione: '#0a84ff',
  pulizia:      '#30d158',
  impianto:     '#ffd60a',
  riparazione:  '#ff2d55',
  acquisto:     '#bf5af2',
  altro:        '#555'
};

function setFilter(f){
  archFilter = f;
  document.querySelectorAll('.arch-filter').forEach(b=>b.classList.remove('active'));
  const map={all:'filt-all',manutenzione:'filt-man',pulizia:'filt-pul',impianto:'filt-imp'};
  const bid = map[f]||'filt-all';
  const btn = document.getElementById(bid);
  if(btn) btn.classList.add('active');
  renderArch();
}

function renderArch(){
  const el = document.getElementById('arch-list');
  const q = (document.getElementById('arch-search')||{value:''}).value.toLowerCase().trim();
  let list = [...archivio].sort((a,b)=>new Date(b.data)-new Date(a.data));
  if(archFilter!=='all') list=list.filter(e=>e.cat===archFilter);
  if(q) list=list.filter(e=>e.titolo.toLowerCase().includes(q)||(e.note||'').toLowerCase().includes(q));
  if(!list.length){
    el.innerHTML='<div class="arch-empty">Nessun intervento registrato.<br>Aggiungi il primo qui sotto.</div>';
    return;
  }
  el.innerHTML = list.map(e=>{
    const col = CAT_COLORS[e.cat]||'#555';
    const dataStr = e.data ? new Date(e.data+'T00:00:00').toLocaleDateString('it-IT',{day:'2-digit',month:'short',year:'numeric'}) : '—';
    const scadStr = e.scad ? '· Prossima: '+new Date(e.scad+'T00:00:00').toLocaleDateString('it-IT',{day:'2-digit',month:'short',year:'numeric'}) : '';
    const scadExpired = e.scad && new Date(e.scad) < new Date();
    return `<div class="arch-entry" style="--ic:${col}">
      <div class="arch-entry-top">
        <div class="arch-entry-title">${e.titolo}</div>
        <div class="arch-entry-date">${dataStr} ${scadStr}</div>
      </div>
      <span class="arch-entry-cat" style="background:${col}22;color:${col}">${e.cat}</span>
      ${e.note?`<div class="arch-entry-note">${e.note}</div>`:''}
      ${scadExpired?`<div class="arch-entry-note" style="color:#ff2d55;margin-top:4px">⚠ Scadenza superata</div>`:''}
      <button class="arch-entry-del" onclick="eliminaArch('${e.id}')">Elimina</button>
    </div>`;
  }).join('');
}

function checkScadenze(){
  const oggi = new Date(); oggi.setHours(0,0,0,0);
  const scad = archivio.filter(e=>e.scad && new Date(e.scad+'T00:00:00') <= new Date(oggi.getTime()+7*86400000));
  document.getElementById('due-corner').innerHTML = scad.length>0
    ? `<div class="due-badge" onclick="openPanel('att-panel')">${scad.length} in scadenza</div>` : '';
}

function openArchDialog(){
  const inp = document.getElementById('arch-input');
  const titolo = inp ? inp.value.trim() : '';
  if(inp) inp.value='';
  document.getElementById('ad-titolo').value = titolo;
  document.getElementById('ad-note').value = '';
  document.getElementById('ad-data').value = new Date().toISOString().split('T')[0];
  document.getElementById('ad-scad').value = '';
  document.getElementById('ad-cat').value = 'manutenzione';
  document.getElementById('arch-dialog').classList.add('open');
}
function closeArchDialog(){ document.getElementById('arch-dialog').classList.remove('open'); }

function salvaArch(){
  const titolo = document.getElementById('ad-titolo').value.trim();
  if(!titolo){ showToast('Inserisci un titolo'); return; }
  archivio.push({
    id: Date.now().toString(),
    titolo,
    cat:   document.getElementById('ad-cat').value,
    data:  document.getElementById('ad-data').value || new Date().toISOString().split('T')[0],
    note:  document.getElementById('ad-note').value.trim(),
    scad:  document.getElementById('ad-scad').value || null
  });
  saveArch(archivio); renderArch(); checkScadenze(); closeArchDialog();
  showToast('Intervento salvato');
}

function eliminaArch(id){
  if(!confirm('Eliminare questo intervento?')) return;
  archivio = archivio.filter(x=>x.id!==id);
  saveArch(archivio); renderArch(); checkScadenze();
}

function attContext(){
  if(!archivio.length) return 'Nessun intervento in archivio.';
  const oggi = new Date(); oggi.setHours(0,0,0,0);
  const scad = archivio.filter(e=>e.scad && new Date(e.scad+'T00:00:00') < oggi).map(e=>e.titolo);
  const imm  = archivio.filter(e=>e.scad && new Date(e.scad+'T00:00:00') >= oggi && new Date(e.scad+'T00:00:00') <= new Date(oggi.getTime()+7*86400000)).map(e=>e.titolo);
  const rec  = [...archivio].sort((a,b)=>new Date(b.data)-new Date(a.data)).slice(0,3).map(e=>`${e.titolo}(${e.data})`);
  let ctx = '';
  if(scad.length) ctx += `SCADUTI: ${scad.join(', ')}. `;
  if(imm.length)  ctx += `IN SCADENZA: ${imm.join(', ')}. `;
  ctx += `Ultimi interventi: ${rec.join(', ')}.`;
  return ctx;
}

// AI

function buildSystem(breve=false){
  const n=new Date();
  const stag=['Inverno','Inverno','Primavera','Primavera','Primavera','Estate','Estate','Estate','Autunno','Autunno','Autunno','Inverno'];
  return `Sei "Casa", assistente domestico per Leo a ${CITY}.
Data: ${n.toLocaleString('it-IT')} — ${stag[n.getMonth()]}
Meteo: ${weatherSummary()}
Attività: ${attContext()}
Rispondi in italiano, tono diretto e amichevole.${breve?' Massimo 2 frasi brevi (risposta vocale).':''}`;
}

async function callClaude(messages, breve=false){
  const res = await fetch('https://api.anthropic.com/v1/messages',{
    method:'POST',
    headers:{
      'Content-Type':'application/json',
      'x-api-key':apiKey,
      'anthropic-version':'2023-06-01',
      'anthropic-dangerous-direct-browser-access':'true'
    },
    body:JSON.stringify({
      model:'claude-sonnet-4-5',
      max_tokens:breve?150:600,
      system:buildSystem(breve),
      messages
    })
  });
  const d=await res.json();
  if(d.error) throw new Error(d.error.message);
  return d.content[0].text;
}

async function askAI(text){
  chatHistory.push({role:'user',content:text});
  setTyping(true);
  try{
    const reply=await callClaude(chatHistory,false);
    setTyping(false); addMsg(reply,'ai');
    chatHistory.push({role:'assistant',content:reply});
    if(chatHistory.length>20)chatHistory=chatHistory.slice(-16);
  }catch(e){
    setTyping(false);
    addMsg(e.message.includes('401')?'[ API key non valida ]':`[ Errore: ${e.message} ]`,'ai');
  }
}

function addMsg(text,who){
  const area=document.getElementById('chat-area'),typing=document.getElementById('typing');
  const d=document.createElement('div');d.className=`msg ${who}`;
  if(who==='ai')d.innerHTML=`<div class="lbl">Casa ·</div>${fmt(text)}`;
  else d.textContent=text;
  area.insertBefore(d,typing);area.scrollTop=area.scrollHeight;
}
function fmt(t){ return t.replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>').replace(/\*(.*?)\*/g,'<em>$1</em>').replace(/\n/g,'<br>'); }
function setTyping(on){ document.getElementById('typing').className=on?'typing on':'typing'; if(on)document.getElementById('chat-area').scrollTop=999999; }

async function sendMessage(){
  const el=document.getElementById('cp-input'),t=el.value.trim();if(!t)return;
  addMsg(t,'user');el.value='';autoResize(el);await askAI(t);
}
async function quickAsk(t){ openPanel('chat-panel');addMsg(t,'user');await askAI(t); }
function handleKey(e){ if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMessage();} }
function autoResize(el){ el.style.height='auto';el.style.height=Math.min(el.scrollHeight,100)+'px'; }

// ══════════════════════════════
// WAKE WORD + VOCE
// ══════════════════════════════
function setState(s){
  currentState=s;
  const wrap=document.getElementById('mic-wrap');
  const btn=document.getElementById('mic-btn');
  const lbl=document.getElementById('mic-lbl');
  wrap.className='mic-ring-wrap';
  const states={
    'wake-active':['state-wake-active','◉','in ascolto...'],
    'listening':  ['state-listening','■','parla ora'],
    'thinking':   ['state-thinking','…','sto pensando...'],
    'speaking':   ['state-speaking','◎','sto parlando...'],
  };
  if(states[s]){
    wrap.classList.add(states[s][0]);
    btn.dataset.state=states[s][1];
    lbl.textContent=states[s][2];
  } else { btn.dataset.state='idle'; lbl.textContent=''; }
}

function toggleWake(){
  if(currentState==='speaking'){ window.speechSynthesis.cancel();isSpeaking=false;startWakeWord();return; }
  if(wakeEnabled){ stopWakeWord();return; }
  startWakeWord();
}

function startWakeWord(){
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SR){ showToast('Microfono non supportato');return; }
  wakeEnabled=true; setState('wake-active'); listenLoop();
}

function stopWakeWord(){
  wakeEnabled=false;
  if(wakeRecognition){ try{wakeRecognition.stop();}catch(e){} wakeRecognition=null; }
  setState('idle');
}

function listenLoop(){
  if(!wakeEnabled)return;
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  wakeRecognition=new SR();
  wakeRecognition.lang='it-IT';
  wakeRecognition.continuous=false;
  wakeRecognition.interimResults=false;
  wakeRecognition.maxAlternatives=5;

  wakeRecognition.onresult=(e)=>{
    let text='',detected=false;
    for(let i=0;i<e.results.length;i++)
      for(let j=0;j<e.results[i].length;j++){
        const t=e.results[i][j].transcript.toLowerCase().trim();
        text+=t+' ';
        if(/claud|clod|klaud|klod|cloud/.test(t)) detected=true;
      }
    if(detected){
      const cmd=text.replace(/claud\w*|clod\w*|klaud\w*|klod\w*|cloud\w*/gi,'').trim();
      if(cmd.length>3) handleCommand(cmd);
      else listenForCommand();
    } else {
      if(wakeEnabled) setTimeout(listenLoop,200);
    }
  };

  wakeRecognition.onerror=(e)=>{
    const retry=(e.error==='no-speech'||e.error==='aborted')?300:1500;
    if(wakeEnabled) setTimeout(listenLoop,retry);
  };

  wakeRecognition.onend=()=>{
    if(wakeEnabled&&currentState==='wake-active') setTimeout(listenLoop,200);
  };

  try{ wakeRecognition.start(); }
  catch(e){ if(wakeEnabled) setTimeout(listenLoop,1000); }
}

function listenForCommand(){
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  const r=new SR();
  r.lang='it-IT';r.continuous=false;r.interimResults=false;
  setState('listening'); beep();
  r.onresult=(e)=>{ handleCommand(e.results[0][0].transcript); };
  r.onerror=()=>{ setState('wake-active');if(wakeEnabled)setTimeout(listenLoop,300); };
  r.onend=()=>{ if(currentState==='listening'){setState('wake-active');if(wakeEnabled)setTimeout(listenLoop,300);} };
  try{ r.start(); }catch(e){ setState('wake-active');if(wakeEnabled)setTimeout(listenLoop,500); }
}

async function handleCommand(cmd){
  setState('thinking');
  addMsg(cmd,'user');
  const msgs=[...chatHistory,{role:'user',content:cmd}];
  try{
    const reply=await callClaude(msgs,true);
    chatHistory.push({role:'user',content:cmd});
    chatHistory.push({role:'assistant',content:reply});
    if(chatHistory.length>20)chatHistory=chatHistory.slice(-16);
    addMsg(reply,'ai');
    speakText(reply,()=>{ if(wakeEnabled)setTimeout(listenLoop,400); });
  }catch(err){
    const msg=err.message.includes('401')?'Chiave API non valida':'Errore di connessione';
    addMsg(`[ ${msg} ]`,'ai');
    setState(wakeEnabled?'wake-active':'idle');
    if(wakeEnabled)setTimeout(listenLoop,1500);
  }
}

async function speakText(text, onEnd=null){
  const clean = text
    .replace(/\*\*(.*?)\*\*/g,'$1')
    .replace(/\*(.*?)\*/g,'$1')
    .replace(/#+\s/g,'')
    .replace(/<[^>]+>/g,'');

  // ── ElevenLabs (voce naturale) ──
  if(elKey && elVoice){
    setState('speaking');
    isSpeaking = true;
    try{
      const res = await fetch(`https://api.elevenlabs.io/v1/text-to-speech/${elVoice}`, {
        method: 'POST',
        headers: {
          'xi-api-key': elKey,
          'Content-Type': 'application/json',
          'Accept': 'audio/mpeg'
        },
        body: JSON.stringify({
          text: clean,
          model_id: 'eleven_multilingual_v2',
          voice_settings: { stability: 0.5, similarity_boost: 0.8, style: 0.3, use_speaker_boost: true }
        })
      });
      if(!res.ok) throw new Error('EL ' + res.status);
      const blob = await res.blob();
      const url  = URL.createObjectURL(blob);
      const audio = new Audio(url);
      audio.onended = () => {
        isSpeaking = false;
        URL.revokeObjectURL(url);
        setState(wakeEnabled ? 'wake-active' : 'idle');
        if(onEnd) onEnd();
      };
      audio.onerror = () => {
        isSpeaking = false;
        setState(wakeEnabled ? 'wake-active' : 'idle');
        if(onEnd) onEnd();
      };
      audio.play();
      return;
    }catch(e){
      console.warn('ElevenLabs error, fallback browser TTS:', e);
      // fallback al browser
    }
  }

  // ── Fallback: browser TTS ──
  if(!window.speechSynthesis){ setState('idle'); if(onEnd)onEnd(); return; }
  window.speechSynthesis.cancel();
  const utt = new SpeechSynthesisUtterance(clean);
  utt.lang='it-IT'; utt.rate=1.0; utt.pitch=1.0;
  const doSpeak = () => {
    const voices = window.speechSynthesis.getVoices();
    const v = voices.find(v=>v.lang==='it-IT') || voices.find(v=>v.lang.startsWith('it'));
    if(v) utt.voice = v;
    utt.onstart = ()=>{ isSpeaking=true; setState('speaking'); };
    utt.onend   = ()=>{ isSpeaking=false; setState(wakeEnabled?'wake-active':'idle'); if(onEnd)onEnd(); };
    utt.onerror = ()=>{ isSpeaking=false; setState(wakeEnabled?'wake-active':'idle'); if(onEnd)onEnd(); };
    window.speechSynthesis.speak(utt);
  };
  const voices = window.speechSynthesis.getVoices();
  if(voices.length>0) doSpeak();
  else { window.speechSynthesis.onvoiceschanged = doSpeak; }
}

function beep(){
  try{
    const ctx=new(window.AudioContext||window.webkitAudioContext)();
    const o=ctx.createOscillator(),g=ctx.createGain();
    o.connect(g);g.connect(ctx.destination);
    o.frequency.value=900;o.type='sine';
    g.gain.setValueAtTime(.12,ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(.001,ctx.currentTime+.12);
    o.start();o.stop(ctx.currentTime+.12);
  }catch(e){}
}

if(window.speechSynthesis){
  window.speechSynthesis.getVoices();
  window.speechSynthesis.onvoiceschanged=()=>window.speechSynthesis.getVoices();
}

function toggleFullscreen(){
  const el = document.documentElement;
  const fsIcon = document.getElementById('fs-icon');
  if(!document.fullscreenElement){
    (el.requestFullscreen||el.webkitRequestFullscreen||el.mozRequestFullScreen||el.msRequestFullscreen).call(el);
  } else {
    (document.exitFullscreen||document.webkitExitFullscreen||document.mozCancelFullScreen||document.msExitFullscreen).call(document);
  }
}
document.addEventListener('fullscreenchange', ()=>{
  const fs = !!document.fullscreenElement;
  const ic = document.getElementById('fs-icon');
  if(ic) ic.innerHTML = fs
    ? '<path d="M8 3v3a2 2 0 0 1-2 2H3"/><path d="M21 8h-3a2 2 0 0 1-2-2V3"/><path d="M3 16h3a2 2 0 0 1 2 2v3"/><path d="M16 21v-3a2 2 0 0 1 2-2h3"/>'
    : '<path d="M8 3H5a2 2 0 0 0-2 2v3"/><path d="M21 8V5a2 2 0 0 0-2-2h-3"/><path d="M3 16v3a2 2 0 0 0 2 2h3"/><path d="M16 21h3a2 2 0 0 0 2-2v-3"/>';
});

function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),3000);
}
